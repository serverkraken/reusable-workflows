# tests/callers/test-python-cov-fail.yml
# Failure-path caller for test-python.yml. The cov-fail fixture ships
# library code with no tests, so pytest's --cov-fail-under gate trips
# and the atom MUST exit non-zero. The assert-failed job uses
# `if: always()` to run even when the test job fails, then checks that
# `needs.test.result == 'failure'`.
name: caller-test-python-cov-fail
on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/test-python.yml'
      - 'actions/setup-python-deps/**'
      - 'tests/callers/test-python-cov-fail.yml'
      - 'tests/fixtures/lint-test/python-cov-fail/**'

jobs:
  test:
    uses: ./.github/workflows/test-python.yml
    secrets: inherit
    with:
      working_directory: tests/fixtures/lint-test/python-cov-fail
      coverage_threshold: 90

  assert-failed:
    needs: test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Assert test job failed
        env:
          RESULT: ${{ needs.test.result }}
        run: |
          if [[ "$RESULT" != "failure" ]]; then
            echo "::error::expected test job to fail (coverage gate), got: $RESULT"
            exit 1
          fi
          echo "test-python-cov-fail: correctly observed failure"
