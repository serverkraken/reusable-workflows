# tests/callers/test-rust-happy.yml
# Happy-path caller for test-rust.yml. Reuses the rust-happy fixture, which
# carries unit tests covering the public surface, so cargo-llvm-cov clears
# the 90 % line-coverage gate.
name: caller-test-rust-happy
on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/test-rust.yml'
      - 'tests/callers/test-rust-happy.yml'
      - 'tests/fixtures/lint-test/rust-happy/**'

jobs:
  test:
    uses: ./.github/workflows/test-rust.yml
    secrets: inherit
    with:
      working_directory: tests/fixtures/lint-test/rust-happy
      coverage_threshold: 90
