# tests/callers/lint-rust-fail.yml
# Failure-path caller for lint-rust.yml. The lint-fail fixture has bad
# formatting + clippy warnings (needless_return, unused_variables); the
# atom MUST exit non-zero. The assert-failed job uses `if: always()` to
# run even when the lint job fails, then checks that
# `needs.lint.result == 'failure'`.
name: caller-lint-rust-fail
on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/lint-rust.yml'
      - 'tests/callers/lint-rust-fail.yml'
      - 'tests/fixtures/lint-test/rust-lint-fail/**'

jobs:
  lint:
    uses: ./.github/workflows/lint-rust.yml
    secrets: inherit
    with:
      working_directory: tests/fixtures/lint-test/rust-lint-fail

  assert-failed:
    needs: lint
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Assert lint job failed
        env:
          RESULT: ${{ needs.lint.result }}
        run: |
          if [[ "$RESULT" != "failure" ]]; then
            echo "::error::expected lint job to fail, got: $RESULT"
            exit 1
          fi
