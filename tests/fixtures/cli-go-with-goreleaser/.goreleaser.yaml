# Minimal goreleaser config for the snapshot smoke test. The catalog's
# goreleaser.yml atom invokes `goreleaser release --snapshot --clean` against
# this fixture; nothing is published.
version: 2

builds:
  - id: cli
    main: ./main.go
    binary: cli
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: cli
    formats:
      - tar.gz

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: '{{ incpatch .Version }}-snapshot'

changelog:
  disable: true
