name: prerelease
on:
  workflow_dispatch: {}

jobs:
  build:
    uses: serverkraken/reusable-workflows/.github/workflows/docker-build-multi.yml@v2
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write
      pull-requests: write
    secrets: inherit
    with:
      prerelease: true
      images: |
        [{"dockerfile":"Dockerfile","image_name":"repo"},{"dockerfile":"Dockerfile.worker","image_name":"custom-worker"}]
      sign: ${{ fromJSON(vars.SK_SIGN || 'true') }}
      attest: ${{ fromJSON(vars.SK_ATTEST || 'true') }}
      sbom: ${{ fromJSON(vars.SK_SBOM || 'true') }}
