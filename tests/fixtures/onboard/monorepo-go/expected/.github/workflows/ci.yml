name: ci
on:
  pull_request:

jobs:
  secscan:
    uses: serverkraken/reusable-workflows/.github/workflows/trivy-fs.yml@v2
    permissions:
      contents: read
      security-events: write
      actions: read
    secrets: inherit

  lint-go-services-api:
    uses: serverkraken/reusable-workflows/.github/workflows/lint-go.yml@v2
    with:
      working_directory: services/api
    secrets: inherit
  test-go-services-api:
    uses: serverkraken/reusable-workflows/.github/workflows/test-go.yml@v2
    with:
      working_directory: services/api
    secrets: inherit
  lint-go-services-worker:
    uses: serverkraken/reusable-workflows/.github/workflows/lint-go.yml@v2
    with:
      working_directory: services/worker
    secrets: inherit
  test-go-services-worker:
    uses: serverkraken/reusable-workflows/.github/workflows/test-go.yml@v2
    with:
      working_directory: services/worker
    secrets: inherit
