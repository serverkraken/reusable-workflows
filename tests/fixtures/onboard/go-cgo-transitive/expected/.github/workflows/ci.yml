name: ci
on:
  pull_request:

jobs:
  secscan:
    uses: serverkraken/reusable-workflows/.github/workflows/trivy-fs.yml@v2
    permissions:
      contents: read
      security-events: write
      actions: read
    secrets: inherit

  lint-go-root:
    uses: serverkraken/reusable-workflows/.github/workflows/lint-go.yml@v2
    with:
      working_directory: .
      cgo_enabled: true
    secrets: inherit
  test-go-root:
    uses: serverkraken/reusable-workflows/.github/workflows/test-go.yml@v2
    with:
      working_directory: .
      cgo_enabled: true
    secrets: inherit
