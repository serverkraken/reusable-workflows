name: ci
on:
  pull_request:

jobs:
  secscan:
    uses: serverkraken/reusable-workflows/.github/workflows/trivy-fs.yml@v3
    permissions:
      contents: read
      security-events: write
      actions: read
    with:
      severity: ${{ vars.SK_TRIVY_SEVERITY || 'HIGH,CRITICAL' }}
      trivy_version: ${{ vars.SK_TRIVY_VERSION || '' }}
    secrets: inherit

  lint-rust-root:
    uses: serverkraken/reusable-workflows/.github/workflows/lint-rust.yml@v3
    with:
      working_directory: .
      rust_toolchain: ${{ vars.SK_RUST_TOOLCHAIN || '' }}
      clippy_args: ${{ vars.SK_CLIPPY_ARGS || '-D warnings' }}
    secrets: inherit
  test-rust-root:
    uses: serverkraken/reusable-workflows/.github/workflows/test-rust.yml@v3
    with:
      working_directory: .
      rust_toolchain: ${{ vars.SK_RUST_TOOLCHAIN || '' }}
      coverage_threshold: ${{ vars.SK_COVERAGE_THRESHOLD || '80' }}
      cargo_llvm_cov_version: ${{ vars.SK_CARGO_LLVM_COV_VERSION || 'v0.6.16' }}
    secrets: inherit
