name: ci
on:
  pull_request:

jobs:
  secscan:
    uses: serverkraken/reusable-workflows/.github/workflows/trivy-fs.yml@v3
    permissions:
      contents: read
      security-events: write
      actions: read
    secrets: inherit

  lint-python-root:
    uses: serverkraken/reusable-workflows/.github/workflows/lint-python.yml@v3
    with:
      working_directory: .
    secrets: inherit
  test-python-root:
    uses: serverkraken/reusable-workflows/.github/workflows/test-python.yml@v3
    with:
      working_directory: .
      coverage_threshold: 90
    secrets: inherit
