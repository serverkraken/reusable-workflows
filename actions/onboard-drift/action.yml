name: 'Onboard: drift'
description: 'Compute drift status for a single adopter checkout. Wraps scripts/onboard-drift.sh.'
inputs:
  target_path:
    description: 'Path to the checked-out adopter repo on the runner'
    required: true
  current_version:
    description: 'Current catalog major (e.g. "v3") used to compute behind/clean'
    required: true
  use_go_cli:
    description: 'When true, run sk-workflows drift (Go) instead of scripts/onboard-drift.sh (Bash).'
    required: false
    default: 'false'
outputs:
  status:
    description: |
      clean | modified | behind | behind+modified | no-lock | stale-lock

      stale-lock: lock hashes match working-tree files, but a fresh render of
      the catalog templates at the current catalog state would produce
      different output. Adopter needs re-onboarding to refresh the rendered
      files (and the lock).
    value: ${{ steps.drift.outputs.status }}
  modified:
    description: |
      Comma-separated list of paths whose hash differs from lock (or has the
      (missing) suffix). When status=stale-lock, lists paths whose rendered
      content differs from the lock-tracked hash.
    value: ${{ steps.drift.outputs.modified }}
  lock_version:
    description: 'catalog_version field from .github/onboard.lock.json (empty when no-lock)'
    value: ${{ steps.drift.outputs.lock_version }}
  render_error:
    description: |
      Reason if the render-and-compare check could not run (empty when render
      succeeded or was skipped because status was already non-clean).
      Format: '<phase>:<truncated-stderr>' where phase is detect-failed or
      render-failed.
    value: ${{ steps.drift.outputs.render_error }}
runs:
  using: composite
  steps:
    - name: Install gomplate (idempotent — needed for render-and-compare)
      shell: bash
      run: |
        set -euo pipefail
        # onboard-drift.sh's render-and-compare block shells out to
        # onboard-render.sh, which requires gomplate. Install it here so any
        # consumer of this action (drift-check.yml, onboard-sweep.yml, the
        # Phase 4 caller-onboard-drift-happy.yml) gets the dependency
        # automatically. install-gomplate.sh is idempotent: if the pinned
        # version is already on PATH, it's a no-op.
        sudo "$GITHUB_ACTION_PATH/../../scripts/install-gomplate.sh"

    - id: drift
      shell: bash
      env:
        CATALOG_CURRENT_VERSION: ${{ inputs.current_version }}
        TARGET_PATH: ${{ inputs.target_path }}
        USE_GO_CLI: ${{ inputs.use_go_cli }}
      run: |
        set -euo pipefail
        # Resolve catalog root relative to this action (actions/onboard-drift/action.yml)
        # so the caller doesn't need to know the layout — matches onboard-detect.
        catalog="$GITHUB_ACTION_PATH/../.."
        if [[ "$USE_GO_CLI" == "true" ]]; then
          if [[ -x "$catalog/bin/sk-workflows" ]]; then
            DRIFT="$catalog/bin/sk-workflows"
          else
            if ! command -v go >/dev/null 2>&1; then
              echo "::error::use_go_cli=true but no 'go' toolchain found and no prebuilt bin/sk-workflows present" >&2
              exit 1
            fi
            BUILD_DIR="$(mktemp -d)"
            trap 'rm -rf "$BUILD_DIR"' EXIT
            (
              cd "$catalog"
              GOCACHE="$BUILD_DIR/.gocache" go build -o "$BUILD_DIR/sk-workflows" ./cmd/sk-workflows
            )
            DRIFT="$BUILD_DIR/sk-workflows"
          fi
          "$DRIFT" drift \
            --target-path "$TARGET_PATH" \
            --catalog-path "$catalog" \
            --current-version "$CATALOG_CURRENT_VERSION" >> "$GITHUB_OUTPUT"
        else
          "$catalog/scripts/onboard-drift.sh" \
            "$TARGET_PATH" \
            "$catalog" \
            >> "$GITHUB_OUTPUT"
        fi
