name: 'Onboard: apply repo defaults'
description: 'Apply catalog repo-level defaults to a target. Wraps scripts/apply-repo-defaults.sh.'
inputs:
  token:
    description: 'GitHub token with administration:write on the target repo'
    required: true
  target_repo:
    description: 'owner/repo of the target adopter'
    required: true
  target_path:
    description: 'Path to the checked-out adopter repo on the runner'
    required: true
  prev_defaults_applied_at:
    description: 'Snapshot of the target lock''s defaults_applied_at field BEFORE render. Empty string means first-onboard or re-baseline.'
    required: false
    default: ''
  dry_run:
    description: 'When true, no API mutations and no lock write — only diff summary.'
    required: false
    default: 'false'
  use_go_cli:
    description: 'When true, run sk-workflows apply-defaults (Go) instead of scripts/apply-repo-defaults.sh (Bash).'
    required: false
    default: 'false'
outputs:
  defaults_applied:
    description: 'true if script ran end-to-end in live mode; false in dry-run'
    value: ${{ steps.apply.outputs.defaults_applied }}
  tier_2_applied:
    description: 'true if Tier 2 (comfort) fields were processed this run (live mode only)'
    value: ${{ steps.apply.outputs.tier_2_applied }}
  modified:
    description: 'Live mode only: csv of mutated field-categories (branch_protection,delete_branch_on_merge,topics,merge_hygiene,repo_settings)'
    value: ${{ steps.apply.outputs.modified }}
  would_change:
    description: 'Dry-run only: csv of field-categories that would be mutated'
    value: ${{ steps.apply.outputs.would_change }}
runs:
  using: composite
  steps:
    - id: apply
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        USE_GO_CLI: ${{ inputs.use_go_cli }}
        TARGET_REPO: ${{ inputs.target_repo }}
        TARGET_PATH: ${{ inputs.target_path }}
        PREV_MARKER: ${{ inputs.prev_defaults_applied_at }}
        DRY_RUN: ${{ inputs.dry_run }}
      run: |
        set -euo pipefail
        catalog="$GITHUB_ACTION_PATH/../.."
        flags=()
        if [[ "$DRY_RUN" == "true" ]]; then
          flags+=("--dry-run")
        fi
        if [[ "$USE_GO_CLI" == "true" ]]; then
          if command -v sk-workflows >/dev/null 2>&1; then
            APPLY_DEFAULTS="$(command -v sk-workflows)"
          elif [[ -x "$catalog/bin/sk-workflows" ]]; then
            APPLY_DEFAULTS="$catalog/bin/sk-workflows"
          else
            if ! command -v go >/dev/null 2>&1; then
              echo "::error::use_go_cli=true but no 'go' toolchain found and no sk-workflows binary present" >&2
              exit 1
            fi
            BUILD_DIR="$(mktemp -d)"
            trap 'rm -rf "$BUILD_DIR"' EXIT
            (
              cd "$catalog"
              GOCACHE="$BUILD_DIR/.gocache" go build -o "$BUILD_DIR/sk-workflows" ./cmd/sk-workflows
            )
            APPLY_DEFAULTS="$BUILD_DIR/sk-workflows"
          fi
          "$APPLY_DEFAULTS" apply-defaults \
            --catalog-path "$catalog" \
            --repo "$TARGET_REPO" \
            --target-path "$TARGET_PATH" \
            --prev-marker "$PREV_MARKER" \
            "${flags[@]}" \
            >> "$GITHUB_OUTPUT"
        else
          "$catalog/scripts/apply-repo-defaults.sh" \
            --repo "$TARGET_REPO" \
            --target-path "$TARGET_PATH" \
            --prev-marker "$PREV_MARKER" \
            "${flags[@]}" \
            >> "$GITHUB_OUTPUT"
        fi
