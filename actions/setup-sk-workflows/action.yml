name: 'Setup sk-workflows'
description: 'Install the sk-workflows CLI from a catalog release or build it from source.'

inputs:
  version:
    description: 'Catalog release tag to install, e.g. v4.2.0. Empty uses the action ref when it is a v* tag.'
    required: false
    default: ''
  repository:
    description: 'Repository containing sk-workflows release assets.'
    required: false
    default: 'serverkraken/reusable-workflows'
  github_token:
    description: 'Optional token for downloading release assets from private repositories.'
    required: false
    default: ''
  install_dir:
    description: 'Directory where the sk-workflows binary is installed. Empty uses RUNNER_TEMP.'
    required: false
    default: ''
  build_from_source:
    description: 'When true, build sk-workflows from the checked-out catalog source instead of downloading a release asset.'
    required: false
    default: 'false'

outputs:
  path:
    description: 'Full path to the installed sk-workflows binary.'
    value: ${{ steps.setup.outputs.path }}
  version:
    description: 'Resolved release tag, or source when build_from_source=true.'
    value: ${{ steps.setup.outputs.version }}
  source:
    description: 'Installation source: release or source.'
    value: ${{ steps.setup.outputs.source }}

runs:
  using: composite
  steps:
    - id: setup
      shell: bash
      env:
        INPUT_VERSION: ${{ inputs.version }}
        INPUT_REPOSITORY: ${{ inputs.repository }}
        INPUT_GITHUB_TOKEN: ${{ inputs.github_token }}
        INPUT_INSTALL_DIR: ${{ inputs.install_dir }}
        INPUT_BUILD_FROM_SOURCE: ${{ inputs.build_from_source }}
      run: |
        set -euo pipefail

        install_dir="$INPUT_INSTALL_DIR"
        if [[ -z "$install_dir" ]]; then
          install_dir="${RUNNER_TEMP:-/tmp}/sk-workflows/bin"
        fi
        mkdir -p "$install_dir"

        emit_outputs() {
          local binary="$1"
          local version="$2"
          local source="$3"
          {
            echo "path=$binary"
            echo "version=$version"
            echo "source=$source"
          } >> "$GITHUB_OUTPUT"
          echo "$install_dir" >> "$GITHUB_PATH"
        }

        if [[ "$INPUT_BUILD_FROM_SOURCE" == "true" ]]; then
          if ! command -v go >/dev/null 2>&1; then
            echo "::error::build_from_source=true but no 'go' toolchain found" >&2
            exit 1
          fi
          catalog_root="$GITHUB_ACTION_PATH/../.."
          binary="$install_dir/sk-workflows"
          (
            cd "$catalog_root"
            go build -trimpath -o "$binary" ./cmd/sk-workflows
          )
          chmod +x "$binary"
          emit_outputs "$binary" "source" "source"
          exit 0
        fi

        version="$INPUT_VERSION"
        if [[ -z "$version" && "${GITHUB_ACTION_REF:-}" == v* ]]; then
          version="$GITHUB_ACTION_REF"
        fi
        if [[ -z "$version" ]]; then
          echo "::error::version is required unless the action is used from a v* tag or build_from_source=true" >&2
          exit 1
        fi

        os="$(uname -s | tr '[:upper:]' '[:lower:]')"
        arch="$(uname -m)"
        case "$os" in
          linux) os="linux" ;;
          *)
            echo "::error::unsupported OS for release install: $os" >&2
            exit 1
            ;;
        esac
        case "$arch" in
          x86_64 | amd64) arch="amd64" ;;
          aarch64 | arm64) arch="arm64" ;;
          *)
            echo "::error::unsupported architecture for release install: $arch" >&2
            exit 1
            ;;
        esac

        asset="sk-workflows_${version}_${os}_${arch}.tar.gz"
        checksums="sk-workflows_${version}_checksums.txt"
        tmp="$(mktemp -d)"
        trap 'rm -rf "$tmp"' EXIT

        if [[ -n "$INPUT_GITHUB_TOKEN" && "$(command -v gh || true)" != "" ]]; then
          GH_TOKEN="$INPUT_GITHUB_TOKEN" gh release download "$version" \
            --repo "$INPUT_REPOSITORY" \
            --pattern "$asset" \
            --pattern "$checksums" \
            --dir "$tmp"
        else
          base_url="https://github.com/${INPUT_REPOSITORY}/releases/download/${version}"
          curl_args=(-fsSL)
          if [[ -n "$INPUT_GITHUB_TOKEN" ]]; then
            curl_args+=(-H "Authorization: Bearer $INPUT_GITHUB_TOKEN")
          fi
          curl "${curl_args[@]}" -o "$tmp/$asset" "$base_url/$asset"
          curl "${curl_args[@]}" -o "$tmp/$checksums" "$base_url/$checksums"
        fi

        expected="$(awk -v file="$asset" '$2 == file {print $1}' "$tmp/$checksums")"
        if [[ -z "$expected" ]]; then
          echo "::error::checksum for $asset not found in $checksums" >&2
          exit 1
        fi
        if command -v sha256sum >/dev/null 2>&1; then
          actual="$(sha256sum "$tmp/$asset" | awk '{print $1}')"
        else
          actual="$(shasum -a 256 "$tmp/$asset" | awk '{print $1}')"
        fi
        if [[ "$actual" != "$expected" ]]; then
          echo "::error::checksum mismatch for $asset" >&2
          exit 1
        fi

        tar -xzf "$tmp/$asset" -C "$install_dir"
        binary="$install_dir/sk-workflows"
        chmod +x "$binary"
        emit_outputs "$binary" "$version" "release"
