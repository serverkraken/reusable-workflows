name: 'Onboard: detect language and version'
description: 'Detect a target repo language signal and current GitHub-release version. Wraps scripts/onboard-detect.sh.'
inputs:
  repo_path:
    description: 'Path to the checked-out target repo on the runner'
    required: true
  language_override:
    description: 'auto | go | python | rust | helm | flutter | node | gitops | simple (auto = file-signal detection)'
    required: false
    default: 'auto'
  target_repo:
    description: 'owner/repo for gh api calls (default_branch + latest release)'
    required: true
  github_token:
    description: 'GitHub token with read access to target_repo'
    required: true
  use_go_cli:
    description: 'When true, run sk-workflows detect (Go) instead of scripts/onboard-detect.sh (Bash).'
    required: false
    default: 'false'
outputs:
  language:
    description: 'Detected language'
    value: ${{ steps.detect.outputs.language }}
  release_type:
    description: 'release-please release-type (1:1 with language for V1)'
    value: ${{ steps.detect.outputs.release_type }}
  current_version:
    description: 'Current version without leading v (0.0.0 if no release found)'
    value: ${{ steps.detect.outputs.current_version }}
  default_branch:
    description: 'Default branch of target_repo'
    value: ${{ steps.detect.outputs.default_branch }}
  profile_json:
    description: 'Full structured detection profile (JSON-encoded)'
    value: ${{ steps.detect.outputs.profile_json }}
runs:
  using: composite
  steps:
    - id: detect
      shell: bash
      env:
        TARGET_REPO: ${{ inputs.target_repo }}
        GH_TOKEN: ${{ inputs.github_token }}
        REPO_PATH: ${{ inputs.repo_path }}
        LANG_OVERRIDE: ${{ inputs.language_override }}
        USE_GO_CLI: ${{ inputs.use_go_cli }}
      run: |
        set -euo pipefail
        CATALOG_ROOT="$GITHUB_ACTION_PATH/../.."
        if [[ "$USE_GO_CLI" == "true" ]]; then
          # Prefer a binary installed by actions/setup-sk-workflows; otherwise
          # keep the local/source fallback for PRs and feature branches.
          if command -v sk-workflows >/dev/null 2>&1; then
            DETECTOR="$(command -v sk-workflows)"
          elif [[ -x "$CATALOG_ROOT/bin/sk-workflows" ]]; then
            DETECTOR="$CATALOG_ROOT/bin/sk-workflows"
          else
            if ! command -v go >/dev/null 2>&1; then
              echo "::error::use_go_cli=true but no 'go' toolchain found and no sk-workflows binary present" >&2
              exit 1
            fi
            BUILD_DIR="$(mktemp -d)"
            trap 'rm -rf "$BUILD_DIR"' EXIT
            # Build from the catalog module root so go.mod is always resolved,
            # including when this action is executed from a nested .catalog/ path.
            (
              cd "$CATALOG_ROOT"
              GOCACHE="$BUILD_DIR/.gocache" go build -o "$BUILD_DIR/sk-workflows" ./cmd/sk-workflows
            )
            DETECTOR="$BUILD_DIR/sk-workflows"
          fi
          "$DETECTOR" detect --emit-both \
            --target-repo "$TARGET_REPO" \
            --repo-path "$REPO_PATH" \
            --language-override "$LANG_OVERRIDE" >> "$GITHUB_OUTPUT"
        else
          # Inputs are passed via env to avoid GHA expression interpolation into
          # shell text (a single-quote in any input would terminate the quoted
          # section and inject shell code). The --emit-both mode produces both
          # the legacy key=value outputs AND a profile_json<<DELIM multiline
          # block in a single script invocation, halving gh api roundtrips and
          # avoiding the second shell-startup cost.
          #
          # The action lives in actions/onboard-detect/action.yml; the script
          # lives in scripts/. When invoked via the catalog-checkout pattern,
          # $GITHUB_ACTION_PATH is .catalog/actions/onboard-detect/ so
          # ../../scripts/onboard-detect.sh resolves to .catalog/scripts/onboard-detect.sh.
          "$CATALOG_ROOT/scripts/onboard-detect.sh" --emit-both \
            "$REPO_PATH" "$LANG_OVERRIDE" >> "$GITHUB_OUTPUT"
        fi
