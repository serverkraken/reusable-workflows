# actions/setup-python-deps/action.yml
# Composite action used by lint-python.yml and test-python.yml. Detects the
# Python package manager in working_directory, sets up Python at the right
# version, installs the project and its dev deps, and exposes:
#   outputs.pm          one of poetry | uv | pip-dev | pip-bare
#   outputs.run_prefix  command prefix to invoke project tools:
#                       'poetry run' | 'uv run' | '' (pip paths run tools directly)
#
# Probe order (content first, lockfile as fallback):
#   [tool.poetry] in pyproject.toml  → poetry
#   uv.lock present  OR  [tool.uv] in pyproject.toml  → uv
#   [project.optional-dependencies].dev in pyproject.toml  → pip-dev
#   requirements.txt  → pip-bare
# Hard error if none of the above is present.
name: setup-python-deps
description: Detect Python package manager and install deps for lint/test atoms.
inputs:
  working_directory:
    description: 'Project directory containing the lockfile or pyproject.toml.'
    required: false
    default: '.'
  python_version:
    description: 'Python version. Empty → read from <working_directory>/pyproject.toml.'
    required: false
    default: ''
  install_test_extras:
    description: 'When true, install pytest + pytest-cov on the pip-bare path.'
    required: false
    default: 'false'
outputs:
  pm:
    description: 'Detected package manager.'
    value: ${{ steps.detect.outputs.pm }}
  run_prefix:
    description: 'Prefix to invoke tools.'
    value: ${{ steps.detect.outputs.run_prefix }}
runs:
  using: composite
  steps:
    - name: Detect package manager
      id: detect
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: |
        set -euo pipefail
        pm=""
        prefix=""
        # Detection prefers content-of-pyproject.toml signals over lockfile
        # presence: many Poetry projects gitignore poetry.lock, and a uv
        # project may not have committed uv.lock yet. We use pure-shell
        # `grep` against pyproject.toml because the runner's pre-existing
        # system python may be < 3.11 (no tomllib) at this step — it runs
        # before actions/setup-python has set up a project-version interpreter.
        if [[ -f pyproject.toml ]] && grep -qE '^\s*\[tool\.poetry\]' pyproject.toml; then
          pm=poetry
          prefix="poetry run"
        elif [[ -f uv.lock ]] || { [[ -f pyproject.toml ]] && grep -qE '^\s*\[tool\.uv\]' pyproject.toml; }; then
          pm=uv
          prefix="uv run"
        elif [[ -f pyproject.toml ]] \
            && grep -qE '^\s*\[project\.optional-dependencies\]' pyproject.toml \
            && grep -qE '^\s*dev\s*=' pyproject.toml; then
          pm=pip-dev
          prefix=""
        elif [[ -f requirements.txt ]]; then
          pm=pip-bare
          prefix=""
        else
          echo "::error::no python package manager detected at $(pwd) (need pyproject.toml with [tool.poetry] | [tool.uv] | [project.optional-dependencies].dev, or uv.lock, or requirements.txt)"
          exit 1
        fi
        echo "pm=$pm" >> "$GITHUB_OUTPUT"
        echo "run_prefix=$prefix" >> "$GITHUB_OUTPUT"
        echo "detected pm=$pm"

    - name: Setup Python (from pyproject.toml)
      if: inputs.python_version == '' && steps.detect.outputs.pm != 'pip-bare'
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
      with:
        python-version-file: ${{ inputs.working_directory }}/pyproject.toml

    - name: Setup Python (pip-bare default 3.x)
      if: inputs.python_version == '' && steps.detect.outputs.pm == 'pip-bare'
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
      with:
        python-version: '3.x'

    - name: Setup Python (explicit)
      if: inputs.python_version != ''
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
      with:
        python-version: ${{ inputs.python_version }}

    - name: Install Poetry
      # `pipx` is not guaranteed on self-hosted runners; `pip install poetry`
      # works wherever actions/setup-python has put a Python interpreter on
      # PATH, which is by this point in the composite.
      if: steps.detect.outputs.pm == 'poetry'
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install poetry

    - name: Install uv
      # renovate: datasource=github-releases depName=astral-sh/setup-uv
      # astral-sh/setup-uv doesn't ship a floating major v8 tag (only v1..v7
      # exist). Pin to the specific patch and let Renovate bump it.
      if: steps.detect.outputs.pm == 'uv'
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

    - name: poetry install
      if: steps.detect.outputs.pm == 'poetry'
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: poetry install --no-interaction --no-ansi

    - name: uv sync
      # No --frozen: detection accepts uv projects without a committed
      # uv.lock; in that case uv creates the lock at install time.
      # --all-extras: install [project.optional-dependencies] so dev tools
      # (ruff, mypy, pytest) declared as PEP 621 extras are present. Without
      # this, `uv sync` only resolves required dependencies and the
      # downstream `uv run ruff/pytest` calls fail with "no such file".
      if: steps.detect.outputs.pm == 'uv'
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: uv sync --all-extras

    - name: pip install -e ".[dev]"
      if: steps.detect.outputs.pm == 'pip-dev'
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: pip install -r requirements.txt (+ optional test extras)
      if: steps.detect.outputs.pm == 'pip-bare'
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      env:
        EXTRAS: ${{ inputs.install_test_extras }}
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install ruff mypy
        if [[ "$EXTRAS" == "true" ]]; then
          pip install pytest pytest-cov
        fi
