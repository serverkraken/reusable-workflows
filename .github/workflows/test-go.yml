# .github/workflows/test-go.yml
# Reusable workflow: run `go test` with coverage gate.
#
# Stability surface: the shape of `inputs` below is the contract.
# Exit non-zero when measured line coverage < `coverage_threshold`.
name: test-go
on:
  workflow_call:
    inputs:
      runs_on:
        description: 'JSON-encoded array of runner labels.'
        required: false
        type: string
        default: '["self-hosted","Linux","X64"]'
      working_directory:
        description: 'Component sub-path.'
        required: false
        type: string
        default: '.'
      go_version:
        description: 'Go toolchain version. Empty → read from <working_directory>/go.mod.'
        required: false
        type: string
        default: ''
      coverage_threshold:
        description: 'Minimum line coverage percentage (integer 0-100).'
        required: false
        type: number
        default: 80
      cgo_enabled:
        description: 'Set CGO_ENABLED=1 (true) or 0 (false). Required true for cgo-dependent packages like go-sqlite3.'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: test-go-${{ github.workflow }}-${{ github.ref }}-${{ inputs.working_directory }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    runs-on: ${{ fromJSON(inputs.runs_on) }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Setup Go (from go.mod)
        if: inputs.go_version == ''
        uses: actions/setup-go@v6
        with:
          go-version-file: ${{ inputs.working_directory }}/go.mod
          cache-dependency-path: ${{ inputs.working_directory }}/go.sum

      - name: Setup Go (explicit version)
        if: inputs.go_version != ''
        uses: actions/setup-go@v6
        with:
          go-version: ${{ inputs.go_version }}
          cache-dependency-path: ${{ inputs.working_directory }}/go.sum

      # The serverkraken actions-runner-image does not bake a C toolchain.
      # Until that's added (separate runner-image PR), install gcc + libc6-dev
      # on demand for cgo-using adopters. Idempotent: skips when gcc is already
      # present (e.g. after a future runner-image bump bakes build-essential).
      - name: Install C build deps (cgo)
        if: inputs.cgo_enabled
        run: |
          set -euo pipefail
          if command -v gcc >/dev/null 2>&1; then
            echo "gcc already present at $(command -v gcc) — skipping install"
            exit 0
          fi
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends gcc libc6-dev

      - name: go test with coverage
        id: test
        working-directory: ${{ inputs.working_directory }}
        env:
          CGO_ENABLED: ${{ inputs.cgo_enabled && '1' || '0' }}
        run: go test -coverprofile=cover.out -covermode=atomic ./...

      - name: Coverage gate
        id: coverage
        working-directory: ${{ inputs.working_directory }}
        env:
          THRESHOLD: ${{ inputs.coverage_threshold }}
        run: |
          set -euo pipefail
          # Last line of `go tool cover -func` is the total: `total:    (statements)    87.5%`.
          # awk is universal across runner images; bc is not (missing on the
          # serverkraken self-hosted pool), so we keep all arithmetic in awk.
          pct=$(go tool cover -func=cover.out | awk '/^total:/ {sub("%","",$3); print $3}')
          echo "coverage_pct=${pct}" >> "$GITHUB_OUTPUT"
          echo "threshold=${THRESHOLD}" >> "$GITHUB_OUTPUT"
          echo "coverage: ${pct}% (threshold: ${THRESHOLD}%)"
          awk -v pct="$pct" -v thr="$THRESHOLD" 'BEGIN { exit (pct + 0 < thr + 0) ? 1 : 0 }' || {
            echo "::error::coverage ${pct}% < threshold ${THRESHOLD}%"
            exit 1
          }

      - name: Summary
        if: always()
        env:
          WD: ${{ inputs.working_directory }}
          TEST_OUTCOME: ${{ steps.test.outcome }}
          COVERAGE_OUTCOME: ${{ steps.coverage.outcome }}
          PCT: ${{ steps.coverage.outputs.coverage_pct }}
          THRESHOLD: ${{ steps.coverage.outputs.threshold }}
        run: |
          if [[ "$TEST_OUTCOME" != "success" ]]; then
            result="✗ tests failed"
          elif [[ "$COVERAGE_OUTCOME" != "success" ]]; then
            result="✗ coverage ${PCT}% < threshold ${THRESHOLD}%"
          else
            result="✓ coverage ${PCT}% ≥ threshold ${THRESHOLD}%"
          fi
          {
            echo "## test-go"
            echo ""
            echo "**Tool:** go test"
            echo "**Working dir:** \`${WD}\`"
            echo "**Result:** ${result}"
            echo ""
            echo "| Metric | Value |"
            echo "|---|---|"
            echo "| Coverage | ${PCT:-N/A}% |"
            echo "| Threshold | ${THRESHOLD}% |"
          } >> "$GITHUB_STEP_SUMMARY" || true
