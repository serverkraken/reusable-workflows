# .github/workflows/release-flutter-android.yml
# Reusable workflow: build a signed Android APK and/or AAB and attach it to an
# existing GitHub Release.
#
# Auth: callers MUST pass `secrets: inherit` so the catalog-scoped App
# token can be minted. The catalog repo is private; the implicit
# adopter-scoped `github.token` cannot clone it, so we mint a separate
# token whose only permission is `contents:read` on reusable-workflows.
#
# Stability surface: all `inputs:`, `outputs:` and `secrets:` keys below are
# stable within major v4. Any removal or rename is a major-version bump.
#
# Summary convention: docs/conventions/step-summary.md
name: release-flutter-android
on:
  workflow_call:
    inputs:
      runs_on:
        description: 'JSON-encoded array of runner labels.'
        required: false
        type: string
        default: '["self-hosted","Linux","X64","performance"]'
      working_directory:
        description: 'Path to the Flutter project root, relative to the repo root.'
        required: false
        type: string
        default: '.'
      version:
        description: 'Semver (leading v optional, stripped). Empty only with create_release=true → atom derives <latest-tag>-rc.<run_number> via git describe.'
        required: false
        type: string
        default: ''
      create_release:
        description: 'Atom creates the Release at the resolved tag (honoring prerelease) before upload, instead of needing release-please. Enables manual/ad-hoc builds.'
        required: false
        type: boolean
        default: false
      java_version:
        description: 'Java major version.'
        required: false
        type: string
        default: '17'
      flutter_channel:
        description: 'Flutter release channel.'
        required: false
        type: string
        default: 'stable'
      flutter_version:
        description: 'Specific Flutter version (empty = latest on channel).'
        required: false
        type: string
        default: ''
      use_build_runner:
        description: 'When true, runs dart run build_runner build after pub get.'
        required: false
        type: boolean
        default: true
      build_apk:
        description: 'Build a release APK.'
        required: false
        type: boolean
        default: true
      build_aab:
        description: 'Build a release AAB (Android App Bundle).'
        required: false
        type: boolean
        default: false
      flavor:
        description: 'Build flavor name (empty = no --flavor flag).'
        required: false
        type: string
        default: ''
      prerelease:
        description: 'Mark the GitHub Release as prerelease after upload.'
        required: false
        type: boolean
        default: false
      dart_define_secret_names:
        description: 'Comma-separated secret names forwarded as --dart-define=NAME=$VALUE.'
        required: false
        type: string
        default: ''
      artefact_name_prefix:
        description: 'Prefix for renamed artefact files (empty = github.event.repository.name).'
        required: false
        type: string
        default: ''
    secrets:
      release_please_app_client_id:
        required: true
        description: 'GitHub App Client ID with contents:read on the catalog repo.'
      release_please_app_private_key:
        required: true
        description: 'PEM private key for the GitHub App.'
      ANDROID_KEYSTORE_BASE64:
        required: true
        description: 'Base64-encoded release keystore.'
      ANDROID_STORE_PASSWORD:
        required: true
        description: 'Keystore store password.'
      ANDROID_KEY_ALIAS:
        required: true
        description: 'Key alias inside the keystore.'
      ANDROID_KEY_PASSWORD:
        required: true
        description: 'Key password.'

permissions:
  contents: write

concurrency:
  group: release-flutter-android-${{ github.workflow }}-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ${{ fromJSON(inputs.runs_on) }}
    timeout-minutes: 30
    steps:
      - name: Checkout adopter repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          # Full history + tags so the create_release auto-version path can
          # `git describe` the latest tag.
          fetch-depth: 0
      - name: Mint catalog-scoped App token
        id: catalog-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          client-id: ${{ secrets.release_please_app_client_id }}
          private-key: ${{ secrets.release_please_app_private_key }}
          owner: serverkraken
          repositories: reusable-workflows
      - name: Resolve catalog ref
        # Self-CI (caller == catalog): use the caller's SHA so feature-branch
        # composite-action changes are exercised. Cross-repo (adopters):
        # pin to the floating major tag `v4`. Bump this hardcoded major when
        # a new major releases.
        id: catalog-ref
        env:
          IS_SELF_CI: ${{ github.repository == 'serverkraken/reusable-workflows' }}
          SELF_SHA: ${{ github.sha }}
        run: |
          if [[ "$IS_SELF_CI" == "true" ]]; then
            echo "ref=$SELF_SHA" >> "$GITHUB_OUTPUT"
          else
            # renovate-marker: catalog-major-ref
            echo "ref=v4" >> "$GITHUB_OUTPUT"
          fi
      - name: Checkout catalog (for composite actions)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: serverkraken/reusable-workflows
          ref: ${{ steps.catalog-ref.outputs.ref }}
          token: ${{ steps.catalog-token.outputs.token }}
          path: .catalog
      - name: Setup Flutter toolchain
        uses: ./.catalog/actions/setup-flutter-toolchain
        with:
          java-version: ${{ inputs.java_version }}
          flutter-channel: ${{ inputs.flutter_channel }}
          flutter-version: ${{ inputs.flutter_version }}
          use-build-runner: ${{ inputs.use_build_runner }}
          working-directory: ${{ inputs.working_directory }}

      - name: Resolve version + sync pubspec.yaml
        id: ver
        working-directory: ${{ inputs.working_directory }}
        env:
          INPUT_VERSION: ${{ inputs.version }}
          CREATE_RELEASE: ${{ inputs.create_release }}
        run: |
          set -euo pipefail
          V="${INPUT_VERSION#v}"
          if [[ -z "$V" ]]; then
            if [[ "$CREATE_RELEASE" != "true" ]]; then
              echo "::error::version is required unless create_release=true"
              exit 1
            fi
            # Manual/ad-hoc build: derive <latest-tag>-rc.<run_number>. Strip a
            # leading v and any +build / -prerelease suffix from the latest tag
            # first so the rc identifier attaches to a clean X.Y.Z core.
            LATEST=$(git describe --tags --abbrev=0 2>/dev/null || echo "0.0.0")
            LATEST="${LATEST#v}"; LATEST="${LATEST%%+*}"; LATEST="${LATEST%%-*}"
            V="${LATEST}-rc.${GITHUB_RUN_NUMBER}"
            echo "Auto-derived manual build version: $V"
          fi
          if [[ ! "$V" =~ ^[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "::error::resolved version does not look like semver: $V"
            exit 1
          fi
          sed -i -E "s/^version: .*/version: ${V}+${GITHUB_RUN_NUMBER}/" pubspec.yaml
          echo "bare=$V" >> "$GITHUB_OUTPUT"
          echo "tag=v$V" >> "$GITHUB_OUTPUT"

      - name: Decode keystore
        working-directory: ${{ inputs.working_directory }}
        env:
          KS: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          # Strip all whitespace first: GNU base64 -d tolerates LF wrapping but
          # rejects CR (\r). Secrets set from a CRLF-terminated .b64 file (e.g.
          # base64'd on Windows, or git autocrlf) would otherwise fail with
          # "base64: invalid input". Stripping whitespace is safe — none of it
          # is significant in base64.
          # Written to <working_directory>/android/release.keystore. The build
          # steps pass ANDROID_KEYSTORE_PATH=../release.keystore, which Gradle's
          # file() resolves from the :app module (android/app/) back to this same
          # file. This assumes the standard Flutter layout (android/app two levels
          # under the project root); a non-standard Gradle module depth would need
          # a different ANDROID_KEYSTORE_PATH.
          echo "$KS" | tr -d '[:space:]' | base64 -d > android/release.keystore
          test -s android/release.keystore

      - name: Build dart-define flags
        id: dd
        env:
          SECRETS_JSON: ${{ toJSON(secrets) }}
          NAMES: ${{ inputs.dart_define_secret_names }}
        run: |
          set -euo pipefail
          flags=()
          if [[ -n "$NAMES" ]]; then
            IFS=',' read -ra arr <<< "$NAMES"
            for n in "${arr[@]}"; do
              n="${n//[[:space:]]/}"
              [[ -z "$n" ]] && continue
              v=$(echo "$SECRETS_JSON" | jq -r --arg k "$n" '.[$k] // ""')
              if [[ -z "$v" ]]; then
                echo "::error::dart_define_secret_names references unknown/empty secret: $n"
                exit 1
              fi
              flags+=("--dart-define=$n=$v")
            done
          fi
          printf '%s\n' "${flags[*]}" > "$RUNNER_TEMP/dart-define-flags"

      - name: Build APK
        if: ${{ inputs.build_apk }}
        working-directory: ${{ inputs.working_directory }}
        env:
          ANDROID_KEYSTORE_PATH: ../release.keystore
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          FLAVOR: ${{ inputs.flavor }}
        run: |
          set -euo pipefail
          DD=$(cat "$RUNNER_TEMP/dart-define-flags" || true)
          flavor_arg=""; [[ -n "$FLAVOR" ]] && flavor_arg="--flavor=$FLAVOR"
          # shellcheck disable=SC2086
          flutter build apk --release --build-number="$GITHUB_RUN_NUMBER" $flavor_arg $DD

      - name: Build AAB
        if: ${{ inputs.build_aab }}
        working-directory: ${{ inputs.working_directory }}
        env:
          ANDROID_KEYSTORE_PATH: ../release.keystore
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          FLAVOR: ${{ inputs.flavor }}
        run: |
          set -euo pipefail
          DD=$(cat "$RUNNER_TEMP/dart-define-flags" || true)
          flavor_arg=""; [[ -n "$FLAVOR" ]] && flavor_arg="--flavor=$FLAVOR"
          # shellcheck disable=SC2086
          flutter build appbundle --release --build-number="$GITHUB_RUN_NUMBER" $flavor_arg $DD

      - name: Rename + collect artefacts
        id: artefacts
        working-directory: ${{ inputs.working_directory }}
        env:
          PREFIX: ${{ inputs.artefact_name_prefix }}
          VERSION_TAG: ${{ steps.ver.outputs.tag }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail
          name_prefix="${PREFIX:-$REPO_NAME}"
          paths=()
          if [[ -f build/app/outputs/flutter-apk/app-release.apk ]]; then
            t="${name_prefix}-${VERSION_TAG}.apk"; mv build/app/outputs/flutter-apk/app-release.apk "$t"; paths+=("$t")
          fi
          if [[ -f build/app/outputs/bundle/release/app-release.aab ]]; then
            t="${name_prefix}-${VERSION_TAG}.aab"; mv build/app/outputs/bundle/release/app-release.aab "$t"; paths+=("$t")
          fi
          if [[ ${#paths[@]} -eq 0 ]]; then
            echo "::error::neither APK nor AAB produced — check build_apk / build_aab inputs"; exit 1
          fi
          printf '%s\n' "files=${paths[*]}" >> "$GITHUB_OUTPUT"

      - name: Attach to release
        working-directory: ${{ inputs.working_directory }}
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.ver.outputs.tag }}
          FILES: ${{ steps.artefacts.outputs.files }}
          PRE: ${{ inputs.prerelease }}
          CREATE_RELEASE: ${{ inputs.create_release }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          # Manual/ad-hoc flow: create the release if it doesn't exist yet.
          # release-please flow (create_release=false) expects it to exist.
          if [[ "$CREATE_RELEASE" == "true" ]] && ! gh release view "$TAG" >/dev/null 2>&1; then
            pre_flag=""; [[ "$PRE" == "true" ]] && pre_flag="--prerelease"
            # shellcheck disable=SC2086
            gh release create "$TAG" --title "$TAG" --notes "Automated build for $TAG" --target "$SHA" $pre_flag
          fi
          # shellcheck disable=SC2086
          gh release upload "$TAG" $FILES --clobber
          if [[ "$PRE" == "true" ]]; then
            gh release edit "$TAG" --prerelease
          fi

      - name: Summary
        if: always()
        working-directory: ${{ inputs.working_directory }}
        env:
          FILES: ${{ steps.artefacts.outputs.files }}
          TAG: ${{ steps.ver.outputs.tag }}
          JOB_STATUS: ${{ job.status }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [[ "$JOB_STATUS" == "success" ]]; then
            result="✓ passed"
          else
            result="✗ failed"
          fi
          {
            echo "## release-flutter-android"
            echo ""
            echo "**Tool:** flutter build apk / appbundle"
            echo "**Result:** ${result}"
            echo ""
            if [[ -n "$FILES" ]]; then
              echo "| Artefact | Size |"
              echo "|---|---|"
              for f in $FILES; do
                if [[ -f "$f" ]]; then
                  size_mib=$(awk "BEGIN {printf \"%.1f MiB\", $(wc -c < "$f")/1048576}")
                  echo "| \`${f}\` | ${size_mib} |"
                fi
              done
              echo ""
              echo "Attached to release [\`${TAG}\`](https://github.com/${REPO}/releases/tag/${TAG})."
            fi
          } >> "$GITHUB_STEP_SUMMARY" || true
