# .github/workflows/test-python.yml
# Reusable workflow: run pytest with coverage gate. Package manager
# (poetry/uv/pip) is auto-detected by setup-python-deps.
#
# Auth: callers MUST pass `secrets: inherit` so the catalog-scoped App
# token can be minted. See lint-python.yml for the full explanation.
name: test-python
on:
  workflow_call:
    inputs:
      runs_on:
        description: 'JSON-encoded array of runner labels.'
        required: false
        type: string
        default: '["self-hosted","Linux"]'
      working_directory:
        description: 'Component sub-path.'
        required: false
        type: string
        default: '.'
      python_version:
        description: 'Python version. Empty → read from <working_directory>/pyproject.toml.'
        required: false
        type: string
        default: ''
      coverage_threshold:
        description: 'Minimum line coverage percentage (integer 0-100).'
        required: false
        type: number
        default: 80
    secrets:
      release_please_app_client_id:
        required: true
        description: 'GitHub App Client ID with contents:read on the catalog repo.'
      release_please_app_private_key:
        required: true
        description: 'PEM private key for the GitHub App.'

permissions:
  contents: read

concurrency:
  group: test-python-${{ github.workflow }}-${{ github.ref }}-${{ inputs.working_directory }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    runs-on: ${{ fromJSON(inputs.runs_on) }}
    timeout-minutes: 30
    steps:
      - name: Checkout adopter repo
        uses: actions/checkout@v6
      - name: Mint catalog-scoped App token
        id: catalog-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.release_please_app_client_id }}
          private-key: ${{ secrets.release_please_app_private_key }}
          owner: serverkraken
          repositories: reusable-workflows
      - name: Resolve catalog ref
        id: catalog-ref
        env:
          IS_SELF_CI: ${{ github.repository == 'serverkraken/reusable-workflows' }}
          SELF_SHA: ${{ github.sha }}
        run: |
          if [[ "$IS_SELF_CI" == "true" ]]; then
            echo "ref=$SELF_SHA" >> "$GITHUB_OUTPUT"
          else
            # renovate-marker: catalog-major-ref
            echo "ref=v3" >> "$GITHUB_OUTPUT"
          fi
      - name: Checkout catalog (for composite actions)
        uses: actions/checkout@v6
        with:
          repository: serverkraken/reusable-workflows
          ref: ${{ steps.catalog-ref.outputs.ref }}
          token: ${{ steps.catalog-token.outputs.token }}
          path: .catalog
      - id: setup
        uses: ./.catalog/actions/setup-python-deps
        with:
          working_directory: ${{ inputs.working_directory }}
          python_version: ${{ inputs.python_version }}
          install_test_extras: 'true'

      # Exclude .catalog/ from pytest discovery — see lint-python.yml.
      - name: pytest --cov-fail-under
        working-directory: ${{ inputs.working_directory }}
        env:
          THRESHOLD: ${{ inputs.coverage_threshold }}
        run: ${{ steps.setup.outputs.run_prefix }} pytest --ignore=.catalog --cov --cov-fail-under="$THRESHOLD"
