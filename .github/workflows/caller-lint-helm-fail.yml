# .github/workflows/caller-lint-helm-fail.yml
# Failure-path caller for lint-helm.yml. The helm-lint-fail fixture has a
# Chart.yaml missing the required `name` field, so `helm lint` exits
# non-zero. The assert-failed job uses `if: always()` to run even when
# the lint job fails, then checks that `needs.lint.result == 'failure'`.
name: caller-lint-helm-fail
on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/lint-helm.yml'
      - '.github/workflows/caller-lint-helm-fail.yml'
      - 'tests/fixtures/lint-test/helm-lint-fail/**'

jobs:
  lint:
    uses: ./.github/workflows/lint-helm.yml
    secrets: inherit
    with:
      working_directory: tests/fixtures/lint-test
      charts_dir: helm-lint-fail

  assert-failed:
    needs: lint
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Assert lint job failed
        env:
          RESULT: ${{ needs.lint.result }}
        run: |
          if [[ "$RESULT" != "failure" ]]; then
            echo "::error::expected lint job to fail, got: $RESULT"
            exit 1
          fi
