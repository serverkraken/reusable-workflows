# .github/workflows/caller-helm-publish-happy.yml
# Happy-path caller for helm-publish.yml. Runs in dry-run mode against the
# helm-only fixture so nothing is pushed to GHCR. This file exists primarily
# so the atom's contract has a stable, lintable usage example; integration.yml
# may wire it into self-CI in a later task.
name: caller-helm-publish-happy
on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/helm-publish.yml'
      - '.github/workflows/caller-helm-publish-happy.yml'
      - 'tests/fixtures/helm-only/**'

jobs:
  test-helm-publish:
    uses: ./.github/workflows/helm-publish.yml
    secrets: inherit
    with:
      chart_path: tests/fixtures/helm-only
      oci_registry: ghcr.io/serverkraken/test
      dry_run: true
