# .github/workflows/lint-python.yml
# Reusable workflow: lint Python with ruff (check + format) + mypy.
# Package manager (poetry/uv/pip) is auto-detected by setup-python-deps.
#
# Auth: callers MUST pass `secrets: inherit` so the catalog-scoped App
# token can be minted. The catalog repo is private; the implicit
# adopter-scoped `github.token` cannot clone it, so we mint a separate
# token whose only permission is `contents:read` on reusable-workflows.
name: lint-python
on:
  workflow_call:
    inputs:
      runs_on:
        description: 'JSON-encoded array of runner labels.'
        required: false
        type: string
        default: '["self-hosted","Linux"]'
      working_directory:
        description: 'Component sub-path.'
        required: false
        type: string
        default: '.'
      python_version:
        description: 'Python version. Empty → read from <working_directory>/pyproject.toml.'
        required: false
        type: string
        default: ''
    secrets:
      release_please_app_client_id:
        required: true
        description: 'GitHub App Client ID with contents:read on the catalog repo.'
      release_please_app_private_key:
        required: true
        description: 'PEM private key for the GitHub App.'

permissions:
  contents: read

concurrency:
  group: lint-python-${{ github.workflow }}-${{ github.ref }}-${{ inputs.working_directory }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    runs-on: ${{ fromJSON(inputs.runs_on) }}
    timeout-minutes: 15
    steps:
      - name: Checkout adopter repo
        uses: actions/checkout@v6
      - name: Mint catalog-scoped App token
        id: catalog-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.release_please_app_client_id }}
          private-key: ${{ secrets.release_please_app_private_key }}
          owner: serverkraken
          repositories: reusable-workflows
      - name: Resolve catalog ref
        # Self-CI (caller == catalog): use the caller's SHA so feature-branch
        # composite-action changes are exercised. Cross-repo (adopters):
        # pin to the floating major tag `v4`. Bump this hardcoded major when
        # a new major releases.
        id: catalog-ref
        env:
          IS_SELF_CI: ${{ github.repository == 'serverkraken/reusable-workflows' }}
          SELF_SHA: ${{ github.sha }}
        run: |
          if [[ "$IS_SELF_CI" == "true" ]]; then
            echo "ref=$SELF_SHA" >> "$GITHUB_OUTPUT"
          else
            # renovate-marker: catalog-major-ref
            echo "ref=v4" >> "$GITHUB_OUTPUT"
          fi
      - name: Checkout catalog (for composite actions)
        uses: actions/checkout@v6
        with:
          repository: serverkraken/reusable-workflows
          ref: ${{ steps.catalog-ref.outputs.ref }}
          token: ${{ steps.catalog-token.outputs.token }}
          path: .catalog
      - id: setup
        uses: ./.catalog/actions/setup-python-deps
        with:
          working_directory: ${{ inputs.working_directory }}
          python_version: ${{ inputs.python_version }}
          install_test_extras: 'false'

      # The catalog is checked out into .catalog/ at the adopter root for
      # the composite action above; we must exclude it from the lint walk
      # so the catalog's own intentional lint-fail fixtures don't appear
      # as adopter findings.
      - name: ruff check
        working-directory: ${{ inputs.working_directory }}
        run: ${{ steps.setup.outputs.run_prefix }} ruff check --exclude .catalog .

      - name: ruff format --check
        working-directory: ${{ inputs.working_directory }}
        run: ${{ steps.setup.outputs.run_prefix }} ruff format --check --exclude .catalog .

      - name: mypy
        working-directory: ${{ inputs.working_directory }}
        run: ${{ steps.setup.outputs.run_prefix }} mypy --exclude '\.catalog/' .
