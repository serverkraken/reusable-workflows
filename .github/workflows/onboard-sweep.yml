# .github/workflows/onboard-sweep.yml
# Weekly auto-update + auto-onboard sweep.
# - Re-onboards adopters with status=behind OR status=stale-lock against the
#   current catalog major.
# - Fresh-onboards serverkraken/* repos not yet in onboarding-status.md.
# - Skips repos with topic `no-serverkraken-onboard` (opt-out).
#
# Schedule: Monday 07:00 UTC, 1h after drift-check.yml (06:00 UTC) so the
# drift report Issue already exists when sweep posts its summary comment.
#
# Operational tool — not a public reusable workflow.
# Summary convention: docs/conventions/step-summary.md
name: onboard-sweep
on:
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'When true, enumerate + bucket but skip the batch jobs.'
        required: false
        type: boolean
        default: false

concurrency:
  group: onboard-sweep-${{ github.ref }}
  cancel-in-progress: false

permissions:
  # Top-level must declare the UNION of permissions that nested workflow_call
  # workflows need (onboard.yml's finalize job requests actions: read), plus
  # what the summary job needs (issues: write to post the rolling digest).
  # See memory: troubleshooting_chained_reusable_permissions.
  contents: read
  actions: read
  issues: write

jobs:
  enumerate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      update_targets: ${{ steps.bucket.outputs.update_targets }}
      onboard_targets: ${{ steps.bucket.outputs.onboard_targets }}
      skipped: ${{ steps.bucket.outputs.skipped }}
      current_version: ${{ steps.ver.outputs.current_version }}
      current_minor: ${{ steps.ver.outputs.current_minor }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0  # need full tag history for git describe

      - id: ver
        name: Derive current catalog major + minor
        run: |
          set -euo pipefail
          tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          major=$(echo "$tag" | sed -E 's/^v([0-9]+).*$/v\1/')
          echo "current_version=$major" >> "$GITHUB_OUTPUT"
          echo "current_minor=$tag" >> "$GITHUB_OUTPUT"
          echo "Resolved current major: $major / minor: $tag"

      - name: Mint App token for org-wide enumerate + drift
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          client-id: ${{ secrets.RELEASE_PLEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_APP_PRIVATE_KEY }}
          owner: serverkraken

      - id: list
        name: List all org repos
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          gh api -X GET '/orgs/serverkraken/repos' \
            --paginate -f per_page=100 \
            -q '.[] | select(.archived | not) | select(.name | test("^(reusable-workflows|\\.github)$") | not) | {name: .name, topics: .topics}' \
            > all-repos.json
          count=$(jq -s 'length' all-repos.json)
          echo "Total in-scope repos (before opt-out filter): $count"

      - name: Install gomplate (needed for stale-lock render-and-compare)
        run: sudo ./scripts/install-gomplate.sh

      - id: bucket
        name: Bucket repos into update vs fresh-onboard vs skip
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          CURRENT: ${{ steps.ver.outputs.current_version }}
          CURRENT_MINOR: ${{ steps.ver.outputs.current_minor }}
        run: |
          set -euo pipefail

          # Step 1: filter out opt-out topic
          jq -c 'select(.topics | index("no-serverkraken-onboard") | not)' all-repos.json > in-scope.json

          # Step 2: parse onboarding-status.md for existing rows
          onboarded=$(grep -oE '^\| serverkraken/[A-Za-z0-9._-]+ \|' docs/onboarding-status.md 2>/dev/null | \
                      sed -E 's/^\| serverkraken\/([A-Za-z0-9._-]+) \|.*/\1/' | sort -u || true)

          update_csv=""
          onboard_csv=""
          skipped_csv=""

          while IFS= read -r r; do
            name=$(echo "$r" | jq -r '.name')
            full="serverkraken/$name"

            # Duplicate-PR guard: skip ONLY if the bot's open onboard PR
            # already renders against the current catalog minor. Stale-minor
            # PRs (rendered against an older minor of the same major) and
            # legacy PRs without rendered_against fall through — onboard.yml
            # force-pushes the branch and edits the existing PR.
            case "$(scripts/onboard-sweep-stale-pr-check.sh "$full" "$CURRENT_MINOR")" in
              skip)
                skipped_csv+="${full}:open-pr,"
                continue
                ;;
              stale|no-pr|*)
                ;;  # fall through to drift / fresh-onboard
            esac

            if echo "$onboarded" | grep -qx "$name"; then
              # Bucket A: existing onboarded. Compute drift.
              status=$(scripts/onboard-sweep-drift-status.sh "$full" "$CURRENT") || status="error"
              # Status mapping. Special note on no-lock: a repo in
              # docs/onboarding-status.md with no lock on its default branch
              # typically means an earlier onboard PR was never merged. The
              # sweep's onboard atom is idempotent — it re-renders, force-
              # pushes the bot branch, and edits the existing PR (if any) to
              # the current catalog version. So no-lock belongs in the update
              # bucket. behind+modified stays skipped: those repos have local
              # manual edits that the sweep must not silently overwrite.
              case "$status" in
                behind|stale-lock|no-lock)
                  update_csv+="${full},"
                  ;;
                clean|modified|behind+modified|error|*)
                  skipped_csv+="${full}:${status},"
                  ;;
              esac
            else
              # Bucket B: fresh candidate (not in status doc).
              onboard_csv+="${full},"
            fi
          done < <(jq -c '.' in-scope.json)

          # Strip trailing commas
          update_csv="${update_csv%,}"
          onboard_csv="${onboard_csv%,}"
          skipped_csv="${skipped_csv%,}"

          {
            echo "update_targets=$update_csv"
            echo "onboard_targets=$onboard_csv"
            echo "skipped=$skipped_csv"
          } >> "$GITHUB_OUTPUT"

          uc=$([[ -n "$update_csv" ]] && echo "$update_csv" | tr ',' '\n' | wc -l | tr -d ' ' || echo 0)
          oc=$([[ -n "$onboard_csv" ]] && echo "$onboard_csv" | tr ',' '\n' | wc -l | tr -d ' ' || echo 0)
          sc=$([[ -n "$skipped_csv" ]] && echo "$skipped_csv" | tr ',' '\n' | wc -l | tr -d ' ' || echo 0)
          echo "Update batch ($uc repos): $update_csv"
          echo "Fresh batch ($oc repos): $onboard_csv"
          echo "Skipped ($sc): $skipped_csv"

  update-batch:
    needs: enumerate
    if: needs.enumerate.outputs.update_targets != ''
    uses: ./.github/workflows/onboard.yml
    secrets: inherit
    with:
      target_repos: ${{ needs.enumerate.outputs.update_targets }}
      language: auto
      pin_version: ${{ needs.enumerate.outputs.current_version }}
      rendered_against: ${{ needs.enumerate.outputs.current_minor }}
      # Forward dry_run from the top-level dispatch input (default false for cron).
      # workflow_call inputs require fromJSON wrap for boolean conversion
      # (cf. memory: troubleshooting_gha_type_coercion).
      dry_run: ${{ fromJSON(inputs.dry_run || 'false') }}

  fresh-batch:
    needs: enumerate
    if: needs.enumerate.outputs.onboard_targets != ''
    uses: ./.github/workflows/onboard.yml
    secrets: inherit
    with:
      target_repos: ${{ needs.enumerate.outputs.onboard_targets }}
      language: auto
      pin_version: ${{ needs.enumerate.outputs.current_version }}
      rendered_against: ${{ needs.enumerate.outputs.current_minor }}
      dry_run: ${{ fromJSON(inputs.dry_run || 'false') }}

  summary:
    needs: [enumerate, update-batch, fresh-batch]
    if: always() && needs.enumerate.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Mint App token for catalog repo
        id: cat-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          client-id: ${{ secrets.RELEASE_PLEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_APP_PRIVATE_KEY }}
          owner: serverkraken
          repositories: reusable-workflows

      - name: Build digest body
        id: body
        env:
          UPDATE_TARGETS: ${{ needs.enumerate.outputs.update_targets }}
          ONBOARD_TARGETS: ${{ needs.enumerate.outputs.onboard_targets }}
          SKIPPED: ${{ needs.enumerate.outputs.skipped }}
          UPDATE_RESULT: ${{ needs.update-batch.result }}
          FRESH_RESULT: ${{ needs.fresh-batch.result }}
        run: |
          set -euo pipefail
          today=$(date -u +%Y-%m-%d)

          # Result → glyph + label. Empty/unset → em-dash.
          glyph_for() {
            case "$1" in
              success)   echo "✓ success" ;;
              failure)   echo "✗ failure" ;;
              cancelled) echo "~ cancelled" ;;
              skipped)   echo "skipped" ;;
              "")        echo "—" ;;
              *)         echo "$1" ;;
            esac
          }

          # Count non-empty comma-separated entries.
          count_csv() {
            [[ -z "$1" ]] && { echo 0; return; }
            echo "$1" | awk -F, '{ for (i=1; i<=NF; i++) if ($i ~ /[^[:space:]]/) c++ } END { print c+0 }'
          }

          # Emit one bullet per non-empty CSV entry.
          bullet_list() {
            echo "$1" | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//;/^$/d;s/^/- /'
          }

          # Render skipped CSV (repo:reason) as a 2-col markdown table.
          skipped_table() {
            echo "| Repo | Reason |"
            echo "| --- | --- |"
            echo "$1" | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//;/^$/d' \
              | awk -F: '{ printf "| %s | %s |\n", $1, ($2 ? $2 : "—") }'
          }

          update_count=$(count_csv "$UPDATE_TARGETS")
          fresh_count=$(count_csv "$ONBOARD_TARGETS")
          skipped_count=$(count_csv "$SKIPPED")

          update_label=$(glyph_for "${UPDATE_RESULT:-skipped}")
          fresh_label=$(glyph_for "${FRESH_RESULT:-skipped}")

          {
            echo "## Onboard Sweep — $today"
            echo
            echo "| Batch    | Result      | Count |"
            echo "| -------- | ----------- | ----- |"
            printf "| Update   | %s | %s |\n" "$update_label" "$update_count"
            printf "| Fresh    | %s | %s |\n" "$fresh_label" "$fresh_count"
            printf "| Skipped  | —           | %s |\n" "$skipped_count"
            echo

            if [[ "$update_count" -gt 0 ]]; then
              echo "<details><summary>Update batch — $update_count repos</summary>"
              echo
              bullet_list "$UPDATE_TARGETS"
              echo
              echo "</details>"
              echo
            fi

            if [[ "$fresh_count" -gt 0 ]]; then
              echo "<details><summary>Fresh batch — $fresh_count repos</summary>"
              echo
              bullet_list "$ONBOARD_TARGETS"
              echo
              echo "</details>"
              echo
            fi

            if [[ "$skipped_count" -gt 0 ]]; then
              echo "<details><summary>Skipped — $skipped_count repos</summary>"
              echo
              skipped_table "$SKIPPED"
              echo
              echo "</details>"
              echo
            fi

            echo "_Run: [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})_"
          } > digest.md
          {
            echo 'body<<EOF_DIGEST'
            cat digest.md
            echo 'EOF_DIGEST'
          } >> "$GITHUB_OUTPUT"

      - name: Post digest as comment on rolling Onboarding Drift Report Issue
        env:
          GH_TOKEN: ${{ steps.cat-token.outputs.token }}
          BODY: ${{ steps.body.outputs.body }}
        run: |
          set -euo pipefail
          # Find the rolling Issue by exact title (drift-check.yml uses the
          # same title-match pattern when upserting).
          drift_issue=$(gh issue list \
            --repo serverkraken/reusable-workflows \
            --state open \
            --limit 100 \
            --json number,title \
            -q '.[] | select(.title == "Onboarding Drift Report") | .number' \
            | head -1)
          if [[ -n "$drift_issue" ]]; then
            gh issue comment "$drift_issue" --repo serverkraken/reusable-workflows --body "$BODY"
            echo "Posted summary comment on Issue #$drift_issue"
          else
            gh issue create \
              --repo serverkraken/reusable-workflows \
              --title "Onboard sweep — $(date -u +%Y-%m-%d)" \
              --body "$BODY"
            echo "No rolling drift Issue found — created standalone Issue"
          fi

      - name: Summary
        if: always()
        env:
          UPDATE_TARGETS: ${{ needs.enumerate.outputs.update_targets }}
          ONBOARD_TARGETS: ${{ needs.enumerate.outputs.onboard_targets }}
          SKIPPED: ${{ needs.enumerate.outputs.skipped }}
          UPDATE_RESULT: ${{ needs.update-batch.result }}
          FRESH_RESULT: ${{ needs.fresh-batch.result }}
        run: |
          set -euo pipefail
          # Count non-empty comma-separated entries (mirrors body builder above).
          count_csv() {
            [[ -z "$1" ]] && { echo 0; return; }
            echo "$1" | awk -F, '{ for (i=1; i<=NF; i++) if ($i ~ /[^[:space:]]/) c++ } END { print c+0 }'
          }
          update_count=$(count_csv "${UPDATE_TARGETS:-}")
          fresh_count=$(count_csv "${ONBOARD_TARGETS:-}")
          skipped_count=$(count_csv "${SKIPPED:-}")
          processed=$((update_count + fresh_count))

          # A batch counts as "failed" only when actually executed and failed —
          # 'skipped' (empty targets) and '' (not run) are not failures.
          failed=0
          [[ "${UPDATE_RESULT:-}" == "failure" ]] && failed=$((failed + 1))
          [[ "${FRESH_RESULT:-}" == "failure" ]] && failed=$((failed + 1))

          if [[ "$failed" == "0" ]]; then
            result="✓ ${processed} targets swept"
          else
            result="▲ ${processed} swept, ${failed} batch(es) failed"
          fi
          {
            echo "## onboard-sweep"
            echo ""
            echo "**Tool:** onboard-sweep cron"
            echo "**Result:** ${result}"
            echo ""
            echo "| Metric | Value |"
            echo "|---|---|"
            echo "| Targets processed | ${processed} |"
            echo "| Update batch | ${update_count} (${UPDATE_RESULT:-skipped}) |"
            echo "| Fresh batch | ${fresh_count} (${FRESH_RESULT:-skipped}) |"
            echo "| Skipped | ${skipped_count} |"
            echo "| Batches failed | ${failed} |"
          } >> "$GITHUB_STEP_SUMMARY" || true
