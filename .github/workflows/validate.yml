# .github/workflows/validate.yml
name: validate
on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  actionlint:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install actionlint
        # Install via official script so we can pass -ignore flags.
        #
        # client-id / app-id: actionlint v1.7.12 has a baked-in `popular-actions`
        # data table that does not yet know about `client-id` on
        # actions/create-github-app-token@v3 (only `app-id`). Runtime is fine,
        # only the lint metadata is stale.
        run: |
          bash <(curl -sSL https://raw.githubusercontent.com/rhysd/actionlint/v1.7.12/scripts/download-actionlint.bash) 1.7.12
      - name: Run actionlint
        run: |
          ./actionlint \
            -ignore 'input "client-id" is not defined in action "actions/create-github-app-token@v3"' \
            -ignore 'missing input "app-id" which is required by action "actions/create-github-app-token@v3"'

  yamllint:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install yamllint
        run: pipx install yamllint
      - name: Run yamllint
        run: yamllint .github/ actions/ tests/
      - name: Check step-summary convention
        run: bash tests/conventions/check-step-summary.sh
      - name: Check contract documentation
        run: bash tests/conventions/check-contracts.sh

  renovate-config-check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Validate renovate.json5
        run: npx --yes --package renovate renovate-config-validator .github/renovate.json5

  trivy-renovate-annotation-check:
    # Verify the customManagers regex still matches the # renovate: comment
    # in install-trivy/action.yml. Catches regression where someone reformats
    # the comment in a way that breaks the parser.
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Check that Renovate would detect TRIVY_VERSION
        run: |
          set -e
          PATTERN='# renovate: datasource=github-releases depName=aquasecurity/trivy'
          grep -A1 "$PATTERN" actions/install-trivy/action.yml \
            | grep -E "TRIVY_VERSION: '[0-9]+\.[0-9]+\.[0-9]+'" \
            || { echo "::error::Renovate annotation broken in install-trivy"; exit 1; }

  shell-tests:
    # Run bats unit tests for the catalog's shell scripts (onboard-detect,
    # onboard-render, compute-prerelease-tag). Requires gomplate because the
    # renderer tests shell out to it.
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install bats
        run: sudo apt-get update && sudo apt-get install -y bats jq
      - name: Install gomplate
        run: sudo ./scripts/install-gomplate.sh
      - name: Run bats
        run: bats tests/shell/
