# .github/workflows/cleanup-images.yml
# Summary convention: docs/conventions/step-summary.md
name: cleanup-images
on:
  workflow_call:
    inputs:
      package_name:
        description: 'GHCR package name. Defaults to the calling repo name.'
        required: false
        type: string
        default: ''
      keep_stable_versions:
        description: 'Min count of v* (semver) versions to keep.'
        required: false
        type: number
        default: 10
      prerelease_age_days:
        description: 'Delete non-semver tags older than N days.'
        required: false
        type: number
        default: 14
      runs_on:
        description: 'JSON-encoded array of runner labels.'
        required: false
        type: string
        default: '["self-hosted","Linux"]'

permissions:
  contents: read
  packages: write

concurrency:
  group: cleanup-${{ github.repository }}
  cancel-in-progress: false

jobs:
  cleanup:
    runs-on: ${{ fromJSON(inputs.runs_on) }}
    timeout-minutes: 15
    steps:
      - name: Resolve package name
        id: pkg
        env:
          INPUT_NAME: ${{ inputs.package_name }}
          DEFAULT_NAME: ${{ github.event.repository.name }}
        run: |
          NAME="${INPUT_NAME:-$DEFAULT_NAME}"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Identify prerelease versions older than N days
        id: stale
        env:
          PKG: ${{ steps.pkg.outputs.name }}
          DAYS: ${{ inputs.prerelease_age_days }}
          OWNER: ${{ github.repository_owner }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Date math: works on Linux (date -d) and macOS (date -v).
          CUTOFF=$(date -u -d "$DAYS days ago" '+%Y-%m-%dT%H:%M:%SZ' 2>/dev/null \
                   || date -u -v-"${DAYS}"d '+%Y-%m-%dT%H:%M:%SZ')
          echo "Cutoff date: $CUTOFF"

          # Determine owner type (org vs user) by checking org membership of the owner.
          if gh api "/orgs/${OWNER}" >/dev/null 2>&1; then
            OWNER_PATH="orgs/${OWNER}"
          else
            OWNER_PATH="users/${OWNER}"
          fi

          # URL-encode the package name (may contain slashes for path-style names).
          PKG_ENC=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$PKG")

          # List all versions, filter non-semver tags older than cutoff, extract IDs.
          IDS=$(gh api --paginate "/${OWNER_PATH}/packages/container/${PKG_ENC}/versions" \
            | jq -r --arg cutoff "$CUTOFF" '
                .[] |
                select(.metadata.container.tags // [] | length > 0) |
                select(
                  (.metadata.container.tags | map(test("^v[0-9]+\\.[0-9]+\\.[0-9]+$")) | any) | not
                ) |
                select(.updated_at < $cutoff) |
                .id
              ' \
            | paste -sd, -)
          echo "Matching version IDs: ${IDS:-<none>}"
          echo "ids=$IDS" >> "$GITHUB_OUTPUT"

      - name: Delete stale prerelease versions
        if: steps.stale.outputs.ids != ''
        uses: actions/delete-package-versions@e5bc658cc4c965c472efe991f8beea3981499c55 # v5
        with:
          # package-name + package-type are required by the action.yml schema
          # (actionlint enforces this) even when using package-version-ids,
          # which takes precedence at runtime. Provide them as a no-op default.
          package-name: ${{ steps.pkg.outputs.name }}
          package-type: container
          package-version-ids: ${{ steps.stale.outputs.ids }}

      - name: Prune oldest stable versions over keep threshold
        uses: actions/delete-package-versions@e5bc658cc4c965c472efe991f8beea3981499c55 # v5
        with:
          package-name: ${{ steps.pkg.outputs.name }}
          package-type: container
          min-versions-to-keep: ${{ inputs.keep_stable_versions }}
          delete-only-untagged-versions: false

      - name: Summary
        env:
          PACKAGE: ${{ steps.pkg.outputs.name }}
          KEEP_STABLE: ${{ inputs.keep_stable_versions }}
          PRE_AGE: ${{ inputs.prerelease_age_days }}
          STALE_IDS: ${{ steps.stale.outputs.ids }}
        run: |
          # Derive prerelease-deleted count from the comma-joined ids list.
          # The 'stable' step uses delete-package-versions@v5 directly with no
          # separate outputs — accurate kept/deleted counts for stable versions
          # would require another API call; report '?' to stay truthful.
          if [[ -z "${STALE_IDS:-}" ]]; then
            pre_deleted=0
          else
            pre_deleted=$(echo "$STALE_IDS" | awk -F',' '{print NF}')
          fi
          {
            echo "## cleanup-images"
            echo ""
            echo "**Tool:** GitHub Packages API"
            echo "**Result:** ✓ cleaned"
            echo ""
            echo "**Package:** \`${PACKAGE}\`"
            echo ""
            echo "| Rule | Kept | Deleted |"
            echo "|---|---|---|"
            echo "| Stable (keep last ${KEEP_STABLE}) | ${KEEP_STABLE} (min) | ? |"
            echo "| Prerelease (older than ${PRE_AGE} days) | ? | ${pre_deleted} |"
          } >> "$GITHUB_STEP_SUMMARY" || true
