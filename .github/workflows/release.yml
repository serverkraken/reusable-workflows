# .github/workflows/release.yml
# Opinionated end-to-end release pipeline. Most consumers should call this
# rather than wiring the atoms directly.
name: release
on:
  workflow_call:
    inputs:
      build_image:
        required: false
        type: boolean
        default: true
      run_trivy:
        required: false
        type: boolean
        default: true
      dockerfile:
        required: false
        type: string
        default: './Dockerfile'
      context:
        required: false
        type: string
        default: '.'
      platforms:
        required: false
        type: string
        default: 'linux/amd64,linux/arm64'
      sign:
        description: 'Cosign-sign the manifest list. Pass false on runners without gettext-base / cosign prereqs.'
        required: false
        type: boolean
        default: true
      attest:
        description: 'Generate SLSA build provenance attestation for the image.'
        required: false
        type: boolean
        default: true
      sbom:
        description: 'Generate and upload an SPDX SBOM artifact for the image.'
        required: false
        type: boolean
        default: true
      trivy_severity:
        required: false
        type: string
        default: 'HIGH,CRITICAL'
      image_name:
        description: 'Image name. Default: caller repo (owner/repo). Passed through to docker-build.yml.'
        required: false
        type: string
        default: ''
      runs_on_amd64:
        required: false
        type: string
        default: '["self-hosted","Linux","X64","performance"]'
      runs_on_arm64:
        required: false
        type: string
        default: '["self-hosted","Linux","ARM64"]'
      runs_on_merge:
        required: false
        type: string
        default: '["self-hosted","Linux","low-performance"]'
    secrets:
      release_please_app_client_id:
        required: true
      release_please_app_private_key:
        required: true

permissions:
  # UNION of nested calls: semantic-release (contents/pull-requests/issues:write),
  # docker-build (packages/id-token/attestations/artifact-metadata:write +
  # pull-requests:write), trivy-image (security-events:write, packages:read, actions:read).
  # Required so cross-repo callers (`uses: …/release.yml@v3`) don't hit the
  # strict-intersection permission-ceiling on the nested workflow_call jobs.
  contents: write
  packages: write
  id-token: write
  attestations: write
  artifact-metadata: write
  pull-requests: write
  issues: write
  security-events: write
  actions: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  semantic-release:
    uses: ./.github/workflows/semantic-release.yml
    secrets: inherit

  docker-build:
    needs: semantic-release
    if: needs.semantic-release.outputs.release_created == 'true' && inputs.build_image
    uses: ./.github/workflows/docker-build.yml
    secrets: inherit
    with:
      tag: ${{ needs.semantic-release.outputs.tag_name }}
      prerelease: false
      image_name: ${{ inputs.image_name }}
      dockerfile: ${{ inputs.dockerfile }}
      context: ${{ inputs.context }}
      platforms: ${{ inputs.platforms }}
      sign: ${{ inputs.sign }}
      attest: ${{ inputs.attest }}
      sbom: ${{ inputs.sbom }}
      runs_on_amd64: ${{ inputs.runs_on_amd64 }}
      runs_on_arm64: ${{ inputs.runs_on_arm64 }}
      runs_on_merge: ${{ inputs.runs_on_merge }}

  trivy-image:
    needs: [semantic-release, docker-build]
    if: needs.semantic-release.outputs.release_created == 'true' && inputs.build_image && inputs.run_trivy
    uses: ./.github/workflows/trivy-image.yml
    secrets: inherit
    with:
      image_ref: ${{ needs.docker-build.outputs.image_ref }}
      severity: ${{ inputs.trivy_severity }}
