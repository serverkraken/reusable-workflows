# .github/workflows/semantic-release.yml
# Summary convention: docs/conventions/step-summary.md
name: semantic-release
on:
  workflow_call:
    inputs:
      runs_on:
        required: false
        type: string
        default: '["self-hosted","Linux","low-performance"]'
      release_please_config:
        required: false
        type: string
        default: 'release-please-config.json'
      release_please_manifest:
        required: false
        type: string
        default: '.release-please-manifest.json'
      dry_run:
        description: |
          When true, run release-please without creating/updating a release PR,
          creating a GitHub release, or moving floating major/minor tags.
          Used by integration tests; production callers leave at false.
        required: false
        type: boolean
        default: false
    outputs:
      release_created:
        value: ${{ jobs.release.outputs.release_created }}
      tag_name:
        value: ${{ jobs.release.outputs.tag_name }}
      major_tag:
        value: ${{ jobs.release.outputs.major_tag }}
      minor_tag:
        value: ${{ jobs.release.outputs.minor_tag }}
    secrets:
      release_please_app_client_id:
        required: true
        description: 'GitHub App Client ID for the release-please bot.'
      release_please_app_private_key:
        required: true
        description: 'PEM-formatted private key for the release-please bot.'

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  # Hardcoded 'semantic-release' prefix instead of ${{ github.workflow }} —
  # github.workflow resolves to the CALLER's workflow name, not this atom's,
  # so the spec-suggested pattern doesn't uniquely identify this workflow
  # across multiple callers (e.g. catalog-release + a hypothetical doc-release).
  group: semantic-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ${{ fromJSON(inputs.runs_on) }}
    timeout-minutes: 15
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      major_tag: ${{ steps.float.outputs.major_tag }}
      minor_tag: ${{ steps.float.outputs.minor_tag }}
    steps:
      - name: Mint GitHub App installation token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        id: app-token
        with:
          client-id: ${{ secrets.release_please_app_client_id }}
          private-key: ${{ secrets.release_please_app_private_key }}

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: ${{ inputs.release_please_config }}
          manifest-file: ${{ inputs.release_please_manifest }}
          skip-github-release: ${{ inputs.dry_run }}
          skip-github-pull-request: ${{ inputs.dry_run }}

      - name: Move floating major/minor tags
        id: float
        if: |
          inputs.dry_run == false &&
          steps.release.outputs.release_created == 'true' &&
          !contains(steps.release.outputs.tag_name, '-')
        env:
          NEW_TAG: ${{ steps.release.outputs.tag_name }}
        run: |
          set -euo pipefail
          # Lightweight tags carry no tagger info, so git user.name/email
          # config is intentionally omitted here. The push is authenticated
          # by the checkout's App token (set in the earlier checkout step).
          VERSION="${NEW_TAG#v}"
          IFS='.' read -r MAJOR MINOR _PATCH <<< "$VERSION"
          MAJOR_TAG="v$MAJOR"
          MINOR_TAG="v$MAJOR.$MINOR"
          git tag -f "$MAJOR_TAG"
          git tag -f "$MINOR_TAG"
          git push origin "$MAJOR_TAG" "$MINOR_TAG" --force
          {
            echo "major_tag=$MAJOR_TAG"
            echo "minor_tag=$MINOR_TAG"
          } >> "$GITHUB_OUTPUT"

      - name: Summary
        if: inputs.dry_run == false
        env:
          RELEASED: ${{ steps.release.outputs.release_created }}
          TAG: ${{ steps.release.outputs.tag_name }}
          HTML_URL: ${{ steps.release.outputs.html_url }}
          MAJ: ${{ steps.float.outputs.major_tag }}
          MIN: ${{ steps.float.outputs.minor_tag }}
          REPO: ${{ github.repository }}
        run: |
          if [[ "$RELEASED" == "true" ]]; then
            result="✓ released ${TAG}"
            if [[ -n "${HTML_URL:-}" ]]; then
              url_cell="[${HTML_URL}](${HTML_URL})"
            else
              url_cell="https://github.com/${REPO}/releases/tag/${TAG}"
            fi
            if [[ -n "${MAJ:-}" ]]; then
              float_cell="\`${MAJ}\` · \`${MIN}\`"
            else
              float_cell="—"
            fi
          else
            result="✓ no release (nothing to bump)"
            url_cell="—"
            float_cell="—"
          fi
          {
            echo "## semantic-release"
            echo ""
            echo "**Tool:** release-please"
            echo "**Result:** ${result}"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| New version | \`${TAG:-none}\` |"
            echo "| Floating tags | ${float_cell} |"
            echo "| Release URL | ${url_cell} |"
          } >> "$GITHUB_STEP_SUMMARY" || true
