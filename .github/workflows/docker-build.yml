# .github/workflows/docker-build.yml
#
# Reusable workflow: build a multi-arch image distributed across native
# amd64/arm64 self-hosted runners, push by digest, stitch a manifest list,
# optionally cosign-sign, optionally attest build provenance as a
# cosign-attached SLSA v0.2 in-toto predicate (free-tier-compatible:
# stored as OCI sidecar at <image>@<digest>, verified with
# `cosign verify-attestation --type slsaprovenance`),
# optionally generate an SBOM artifact.
# Summary convention: docs/conventions/step-summary.md
name: docker-build
on:
  workflow_call:
    inputs:
      tag:
        description: 'Image tag. Empty → auto-compute (prerelease only).'
        required: false
        type: string
        default: ''
      prerelease:
        description: 'Prerelease build (no :latest, auto-compute tag if empty).'
        required: false
        type: boolean
        default: false
      image_name:
        description: 'Image name. Default: caller repo (owner/repo).'
        required: false
        type: string
        default: ''
      dockerfile:
        required: false
        type: string
        default: './Dockerfile'
      context:
        required: false
        type: string
        default: '.'
      platforms:
        required: false
        type: string
        default: 'linux/amd64,linux/arm64'
      build_args:
        required: false
        type: string
        default: ''
      sign:
        required: false
        type: boolean
        default: true
      attest:
        description: 'Generate SLSA v0.2 build provenance attestation for the image. Uses cosign keyless signing (free-tier compatible). Verify with `cosign verify-attestation --type slsaprovenance`.'
        required: false
        type: boolean
        default: true
      sbom:
        required: false
        type: boolean
        default: true
      runs_on_amd64:
        required: false
        type: string
        default: '["self-hosted","Linux","X64","performance"]'
      runs_on_arm64:
        required: false
        type: string
        default: '["self-hosted","Linux","ARM64"]'
      runs_on_merge:
        required: false
        type: string
        default: '["self-hosted","Linux","low-performance"]'
    outputs:
      image_ref:
        description: 'Pushed image reference with tag.'
        value: ${{ jobs.merge.outputs.image_ref }}
      digest:
        description: 'Manifest list digest (sha256:...).'
        value: ${{ jobs.merge.outputs.digest }}
      tag:
        description: 'Final tag (auto-computed if input was empty).'
        value: ${{ jobs.version.outputs.tag }}
    secrets:
      release_please_app_client_id:
        required: true
        description: 'GitHub App Client ID with contents:read on the catalog repo.'
      release_please_app_private_key:
        required: true
        description: 'PEM private key for the GitHub App.'

permissions:
  contents: read
  packages: write
  id-token: write
  pull-requests: write

concurrency:
  # Include image_name so multiple callers building DIFFERENT images from the
  # same ref (e.g. integration tests building both minimal-go and with-cve
  # fixtures in parallel) don't cancel each other.
  group: docker-build-${{ inputs.image_name || github.repository }}-${{ inputs.tag || github.ref }}
  cancel-in-progress: ${{ inputs.prerelease }}

jobs:
  version:
    runs-on: ${{ fromJSON(inputs.runs_on_merge) }}
    timeout-minutes: 60
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      moving_tag: ${{ steps.resolve.outputs.moving_tag }}
      image_name: ${{ steps.resolve.outputs.image_name }}
    steps:
      - uses: actions/checkout@v6
      - name: Mint catalog-scoped App token
        id: catalog-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.release_please_app_client_id }}
          private-key: ${{ secrets.release_please_app_private_key }}
          owner: serverkraken
          repositories: reusable-workflows
      - name: Resolve catalog ref
        # Self-CI: caller's SHA. Cross-repo: floating v4. See trivy-fs.yml for rationale.
        id: catalog-ref
        env:
          IS_SELF_CI: ${{ github.repository == 'serverkraken/reusable-workflows' }}
          SELF_SHA: ${{ github.sha }}
        run: |
          if [[ "$IS_SELF_CI" == "true" ]]; then
            echo "ref=$SELF_SHA" >> "$GITHUB_OUTPUT"
          else
            # renovate-marker: catalog-major-ref
            echo "ref=v4" >> "$GITHUB_OUTPUT"
          fi
      - name: Checkout catalog for composite actions
        uses: actions/checkout@v6
        with:
          repository: serverkraken/reusable-workflows
          ref: ${{ steps.catalog-ref.outputs.ref }}
          token: ${{ steps.catalog-token.outputs.token }}
          path: .catalog

      - name: Resolve short SHA
        id: shortsha
        env:
          FULL_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          echo "short=${FULL_SHA:0:7}" >> "$GITHUB_OUTPUT"

      - name: Compute prerelease tag (if needed)
        id: prerelease_tag
        if: inputs.prerelease && inputs.tag == ''
        uses: ./.catalog/actions/compute-prerelease-tag
        with:
          branch: ${{ github.head_ref || github.ref_name }}
          short_sha: ${{ steps.shortsha.outputs.short }}

      - name: Resolve effective tag and image name
        id: resolve
        env:
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_IMAGE: ${{ inputs.image_name }}
          DEFAULT_IMAGE: ${{ github.repository }}
          PRE_TAG: ${{ steps.prerelease_tag.outputs.tag_with_sha }}
          PRE_MOVING: ${{ steps.prerelease_tag.outputs.moving_tag }}
          IS_PRE: ${{ inputs.prerelease }}
        run: |
          TAG="${INPUT_TAG:-}"
          if [[ -z "$TAG" ]] && [[ "$IS_PRE" == "true" ]]; then
            TAG="$PRE_TAG"
          fi
          if [[ -z "$TAG" ]]; then
            echo "::error::tag input is empty and prerelease=false; cannot resolve tag"
            exit 1
          fi
          IMG="${INPUT_IMAGE:-$DEFAULT_IMAGE}"
          {
            echo "tag=$TAG"
            echo "moving_tag=$PRE_MOVING"
            echo "image_name=$IMG"
          } >> "$GITHUB_OUTPUT"

  build:
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
            runs_on_input: runs_on_amd64
          - platform: linux/arm64
            arch: arm64
            runs_on_input: runs_on_arm64
    runs-on: ${{ fromJSON(matrix.runs_on_input == 'runs_on_amd64' && inputs.runs_on_amd64 || inputs.runs_on_arm64) }}
    timeout-minutes: 60
    steps:
      - name: Check platform selected
        id: check
        run: |
          if [[ "${{ inputs.platforms }}" == *"${{ matrix.platform }}"* ]]; then
            echo "selected=true" >> "$GITHUB_OUTPUT"
          else
            echo "selected=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping ${{ matrix.platform }} — not in inputs.platforms"
          fi

      - if: steps.check.outputs.selected == 'true'
        uses: actions/checkout@v6
      - name: Mint catalog-scoped App token
        if: steps.check.outputs.selected == 'true'
        id: catalog-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.release_please_app_client_id }}
          private-key: ${{ secrets.release_please_app_private_key }}
          owner: serverkraken
          repositories: reusable-workflows
      - name: Resolve catalog ref
        # Self-CI: caller's SHA. Cross-repo: floating v4.
        if: steps.check.outputs.selected == 'true'
        id: catalog-ref
        env:
          IS_SELF_CI: ${{ github.repository == 'serverkraken/reusable-workflows' }}
          SELF_SHA: ${{ github.sha }}
        run: |
          if [[ "$IS_SELF_CI" == "true" ]]; then
            echo "ref=$SELF_SHA" >> "$GITHUB_OUTPUT"
          else
            # renovate-marker: catalog-major-ref
            echo "ref=v4" >> "$GITHUB_OUTPUT"
          fi
      - name: Checkout catalog for composite actions
        if: steps.check.outputs.selected == 'true'
        uses: actions/checkout@v6
        with:
          repository: serverkraken/reusable-workflows
          ref: ${{ steps.catalog-ref.outputs.ref }}
          token: ${{ steps.catalog-token.outputs.token }}
          path: .catalog
      - name: Log in to GHCR
        if: steps.check.outputs.selected == 'true'
        uses: ./.catalog/actions/ghcr-login

      - if: steps.check.outputs.selected == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Compute artifact + cache suffix from image_name
        id: suffix
        if: steps.check.outputs.selected == 'true'
        env:
          IMG_NAME: ${{ needs.version.outputs.image_name }}
        run: |
          # Slashes are invalid in artifact names and inconvenient in cache
          # scopes — sanitize to dashes. Including image_name prevents collisions
          # when multiple docker-build callers run in parallel from the same
          # workflow (e.g. integration tests building distinct fixtures).
          echo "value=$(echo "$IMG_NAME" | tr '/' '-')" >> "$GITHUB_OUTPUT"

      - name: Build and push by digest
        id: build
        if: steps.check.outputs.selected == 'true'
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ matrix.platform }}
          build-args: ${{ inputs.build_args }}
          outputs: type=image,name=ghcr.io/${{ needs.version.outputs.image_name }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=build-${{ steps.suffix.outputs.value }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=build-${{ steps.suffix.outputs.value }}-${{ matrix.arch }}

      - name: Export digest
        if: steps.check.outputs.selected == 'true'
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - if: steps.check.outputs.selected == 'true'
        uses: actions/upload-artifact@v7
        with:
          # Arch FIRST, then image-suffix — keeps the merge job's download
          # pattern unambiguous. Putting suffix first allowed "test-fixture-*"
          # to also match "test-fixture-cve-amd64" (because `cve-amd64` is a
          # valid wildcard match for `*`), which mixed digests from unrelated
          # builds in the merge job.
          name: digests-${{ matrix.arch }}-${{ steps.suffix.outputs.value }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    needs: [version, build]
    runs-on: ${{ fromJSON(inputs.runs_on_merge) }}
    timeout-minutes: 60
    outputs:
      image_ref: ${{ steps.compose.outputs.image_ref }}
      digest: ${{ steps.merge_step.outputs.digest }}
    steps:
      - uses: actions/checkout@v6
      - name: Mint catalog-scoped App token
        id: catalog-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.release_please_app_client_id }}
          private-key: ${{ secrets.release_please_app_private_key }}
          owner: serverkraken
          repositories: reusable-workflows
      - name: Resolve catalog ref
        # Self-CI: caller's SHA. Cross-repo: floating v4. See trivy-fs.yml for rationale.
        id: catalog-ref
        env:
          IS_SELF_CI: ${{ github.repository == 'serverkraken/reusable-workflows' }}
          SELF_SHA: ${{ github.sha }}
        run: |
          if [[ "$IS_SELF_CI" == "true" ]]; then
            echo "ref=$SELF_SHA" >> "$GITHUB_OUTPUT"
          else
            # renovate-marker: catalog-major-ref
            echo "ref=v4" >> "$GITHUB_OUTPUT"
          fi
      - name: Checkout catalog for composite actions
        uses: actions/checkout@v6
        with:
          repository: serverkraken/reusable-workflows
          ref: ${{ steps.catalog-ref.outputs.ref }}
          token: ${{ steps.catalog-token.outputs.token }}
          path: .catalog
      - name: Log in to GHCR
        uses: ./.catalog/actions/ghcr-login

      - name: Compute artifact suffix from image_name
        id: suffix
        env:
          IMG_NAME: ${{ needs.version.outputs.image_name }}
        run: |
          echo "value=$(echo "$IMG_NAME" | tr '/' '-')" >> "$GITHUB_OUTPUT"

      - name: Clean digest dir (self-hosted runners persist /tmp between jobs)
        run: rm -rf /tmp/digests && mkdir -p /tmp/digests

      - name: Download amd64 digest
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          name: digests-amd64-${{ steps.suffix.outputs.value }}

      - name: Download arm64 digest
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          name: digests-arm64-${{ steps.suffix.outputs.value }}

      - uses: docker/setup-buildx-action@v4

      - name: Compose tag list
        id: tags
        env:
          IMG: ghcr.io/${{ needs.version.outputs.image_name }}
          TAG: ${{ needs.version.outputs.tag }}
          MOVING: ${{ needs.version.outputs.moving_tag }}
          IS_PRE: ${{ inputs.prerelease }}
        run: |
          ARGS="-t $IMG:$TAG"
          if [[ "$IS_PRE" != "true" ]]; then
            ARGS="$ARGS -t $IMG:latest"
          fi
          if [[ -n "$MOVING" ]]; then
            ARGS="$ARGS -t $IMG:$MOVING"
          fi
          echo "tag_args=$ARGS" >> "$GITHUB_OUTPUT"

      - name: Create manifest list and capture digest
        id: merge_step
        working-directory: /tmp/digests
        env:
          IMG: ghcr.io/${{ needs.version.outputs.image_name }}
          TAG_ARGS: ${{ steps.tags.outputs.tag_args }}
        run: |
          # shellcheck disable=SC2046,SC2086
          docker buildx imagetools create $TAG_ARGS \
            $(printf "$IMG@sha256:%s " *)
          DIGEST=$(docker buildx imagetools inspect "$IMG:${{ needs.version.outputs.tag }}" --format '{{.Manifest.Digest}}')
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

      - name: Compose image_ref output
        id: compose
        run: |
          echo "image_ref=ghcr.io/${{ needs.version.outputs.image_name }}:${{ needs.version.outputs.tag }}" >> "$GITHUB_OUTPUT"

      - name: Install Cosign
        if: inputs.sign || inputs.attest
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign image
        if: inputs.sign
        env:
          IMG: ghcr.io/${{ needs.version.outputs.image_name }}
          DIGEST: ${{ steps.merge_step.outputs.digest }}
        run: cosign sign --yes "$IMG@$DIGEST"

      - name: Attest build provenance (cosign SLSA v0.2)
        if: inputs.attest
        env:
          IMG: ghcr.io/${{ needs.version.outputs.image_name }}
          DIGEST: ${{ steps.merge_step.outputs.digest }}
          REPO: ${{ github.repository }}
          REF: ${{ github.ref }}
          SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          BUILD_STARTED="$(date -u -Iseconds)"
          cat > predicate.json <<EOF
          {
            "buildType": "https://github.com/actions/runner/buildTypes/workflow/v1",
            "builder": {
              "id": "https://github.com/serverkraken/reusable-workflows/.github/workflows/docker-build.yml"
            },
            "invocation": {
              "configSource": {
                "uri": "git+https://github.com/${REPO}@${REF}",
                "digest": {"sha1": "${SHA}"},
                "entryPoint": ".github/workflows/docker-build.yml"
              },
              "parameters": {},
              "environment": {}
            },
            "metadata": {
              "buildInvocationId": "${REPO}/actions/runs/${RUN_ID}",
              "buildStartedOn": "${BUILD_STARTED}",
              "completeness": {"parameters": true, "environment": false, "materials": false},
              "reproducible": false
            },
            "materials": [
              {
                "uri": "git+https://github.com/${REPO}@${REF}",
                "digest": {"sha1": "${SHA}"}
              }
            ]
          }
          EOF
          # Defensive: ensure variable expansion produced well-formed JSON.
          jq empty predicate.json
          cosign attest --yes --type slsaprovenance \
            --predicate predicate.json "${IMG}@${DIGEST}"

      - name: Generate SBOM
        if: inputs.sbom
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          image: ghcr.io/${{ needs.version.outputs.image_name }}:${{ needs.version.outputs.tag }}
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: false

      - name: Upload SBOM artifact
        if: inputs.sbom
        uses: actions/upload-artifact@v7
        with:
          name: sbom-spdx
          path: sbom.spdx.json
          if-no-files-found: error
          retention-days: 30

      - name: Summary
        env:
          IMAGE_NAME: ${{ needs.version.outputs.image_name }}
          TAG: ${{ needs.version.outputs.tag }}
          DIGEST: ${{ steps.merge_step.outputs.digest }}
          PLATFORMS: ${{ inputs.platforms }}
          SIGN: ${{ inputs.sign }}
          ATTEST: ${{ inputs.attest }}
          SBOM: ${{ inputs.sbom }}
        run: |
          glyph_bool() { [[ "$1" == "true" ]] && echo "✓" || echo "−"; }
          {
            echo "## docker-build"
            echo ""
            echo "**Tool:** Buildx (distributed multi-arch)"
            echo "**Result:** ✓ pushed"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Image | \`ghcr.io/${IMAGE_NAME}\` |"
            echo "| Tag | \`${TAG}\` |"
            echo "| Digest | \`${DIGEST}\` |"
            echo "| Platforms | \`${PLATFORMS}\` |"
            echo "| Sign | $(glyph_bool "$SIGN") cosign keyless |"
            echo "| Attest | $(glyph_bool "$ATTEST") SLSA provenance |"
            echo "| SBOM | $(glyph_bool "$SBOM") SPDX-JSON |"
          } >> "$GITHUB_STEP_SUMMARY" || true

  post-comment:
    if: inputs.prerelease && github.event_name == 'pull_request'
    needs: [version, merge]
    runs-on: ${{ fromJSON(inputs.runs_on_merge) }}
    timeout-minutes: 60
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Mint catalog-scoped App token
        id: catalog-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.release_please_app_client_id }}
          private-key: ${{ secrets.release_please_app_private_key }}
          owner: serverkraken
          repositories: reusable-workflows
      - name: Resolve catalog ref
        # Self-CI: caller's SHA. Cross-repo: floating v4.
        id: catalog-ref
        env:
          IS_SELF_CI: ${{ github.repository == 'serverkraken/reusable-workflows' }}
          SELF_SHA: ${{ github.sha }}
        run: |
          if [[ "$IS_SELF_CI" == "true" ]]; then
            echo "ref=$SELF_SHA" >> "$GITHUB_OUTPUT"
          else
            # renovate-marker: catalog-major-ref
            echo "ref=v4" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@v6
        with:
          repository: serverkraken/reusable-workflows
          ref: ${{ steps.catalog-ref.outputs.ref }}
          token: ${{ steps.catalog-token.outputs.token }}
          path: .catalog
      - name: Post PR comment
        uses: ./.catalog/actions/post-prerelease-comment
        with:
          image_ref: ghcr.io/${{ needs.version.outputs.image_name }}:${{ needs.version.outputs.tag }}
          pr_number: ${{ github.event.pull_request.number }}
