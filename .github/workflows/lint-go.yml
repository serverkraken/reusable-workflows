# .github/workflows/lint-go.yml
# Reusable workflow: lint Go code with `go vet` + golangci-lint.
#
# Stability surface: the shape of `inputs` below is the contract — changes
# are SemVer-significant. No `secrets:` block: callers pass `secrets: inherit`
# for transparency but the atom itself reads none.
#
# Auto-detect: when `go_version` is the empty string (default),
# actions/setup-go reads <working_directory>/go.mod.
# Summary convention: docs/conventions/step-summary.md
name: lint-go
on:
  workflow_call:
    inputs:
      runs_on:
        description: 'JSON-encoded array of runner labels.'
        required: false
        type: string
        default: '["self-hosted","Linux","X64"]'
      working_directory:
        description: 'Component sub-path. Atom resolves all paths relative to this.'
        required: false
        type: string
        default: '.'
      go_version:
        description: 'Go toolchain version. Empty → read from <working_directory>/go.mod.'
        required: false
        type: string
        default: ''
      # renovate: datasource=github-releases depName=golangci/golangci-lint
      golangci_lint_version:
        description: 'golangci-lint version (e.g. v2.12.2). Must be v2.1.0+ to be compatible with golangci-lint-action@v9.'
        required: false
        type: string
        default: 'v2.12.2'
      cgo_enabled:
        description: 'Set CGO_ENABLED=1 (true) or 0 (false). Mirror the value used in test-go.yml for cgo-dependent packages.'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: lint-go-${{ github.workflow }}-${{ github.ref }}-${{ inputs.working_directory }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    runs-on: ${{ fromJSON(inputs.runs_on) }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Go (from go.mod)
        if: inputs.go_version == ''
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: ${{ inputs.working_directory }}/go.mod
          cache-dependency-path: ${{ inputs.working_directory }}/go.sum

      - name: Setup Go (explicit version)
        if: inputs.go_version != ''
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ inputs.go_version }}
          cache-dependency-path: ${{ inputs.working_directory }}/go.sum

      # The serverkraken actions-runner-image does not bake a C toolchain.
      # Until that's added (separate runner-image PR), install gcc + libc6-dev
      # on demand for cgo-using adopters. Idempotent: skips when gcc is already
      # present.
      - name: Install C build deps (cgo)
        if: inputs.cgo_enabled
        run: |
          set -euo pipefail
          if command -v gcc >/dev/null 2>&1; then
            echo "gcc already present at $(command -v gcc) — skipping install"
            exit 0
          fi
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends gcc libc6-dev

      - name: go vet
        id: vet
        working-directory: ${{ inputs.working_directory }}
        env:
          CGO_ENABLED: ${{ inputs.cgo_enabled && '1' || '0' }}
        run: go vet ./...

      - name: golangci-lint
        id: lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9
        env:
          CGO_ENABLED: ${{ inputs.cgo_enabled && '1' || '0' }}
        with:
          version: ${{ inputs.golangci_lint_version }}
          working-directory: ${{ inputs.working_directory }}
          args: --timeout=5m

      - name: Summary
        if: always()
        env:
          WD: ${{ inputs.working_directory }}
          GOLANGCI_VERSION: ${{ inputs.golangci_lint_version }}
          VET_OUTCOME: ${{ steps.vet.outcome }}
          LINT_OUTCOME: ${{ steps.lint.outcome }}
        run: |
          glyph() {
            case "$1" in
              success) echo "✓" ;;
              failure) echo "✗" ;;
              skipped) echo "−" ;;
              *)       echo "?" ;;
            esac
          }
          if [[ "$VET_OUTCOME" == "success" && "$LINT_OUTCOME" == "success" ]]; then
            result="✓ passed"
          else
            result="✗ failed"
          fi
          {
            echo "## lint-go"
            echo ""
            echo "**Tools:** go vet, golangci-lint ${GOLANGCI_VERSION}"
            echo "**Working dir:** \`${WD}\`"
            echo "**Result:** ${result}"
            echo ""
            echo "| Check | Status |"
            echo "|---|---|"
            echo "| go vet | $(glyph "$VET_OUTCOME") |"
            echo "| golangci-lint | $(glyph "$LINT_OUTCOME") |"
          } >> "$GITHUB_STEP_SUMMARY" || true
