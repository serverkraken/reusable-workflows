# .github/workflows/lint-rust.yml
# Reusable workflow: lint Rust with cargo fmt --check + cargo clippy -D warnings.
# Summary convention: docs/conventions/step-summary.md
name: lint-rust
on:
  workflow_call:
    inputs:
      runs_on:
        description: 'JSON-encoded array of runner labels.'
        required: false
        type: string
        default: '["self-hosted","Linux","X64"]'
      working_directory:
        description: 'Crate root directory.'
        required: false
        type: string
        default: '.'
      rust_toolchain:
        description: 'rustup toolchain. Empty → rustup reads rust-toolchain.toml if present, else stable.'
        required: false
        type: string
        default: ''
      clippy_args:
        description: 'Extra arguments to clippy after `--`.'
        required: false
        type: string
        default: '-D warnings'

permissions:
  contents: read

concurrency:
  group: lint-rust-${{ github.workflow }}-${{ github.ref }}-${{ inputs.working_directory }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    runs-on: ${{ fromJSON(inputs.runs_on) }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust toolchain (explicit)
        if: inputs.rust_toolchain != ''
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: ${{ inputs.rust_toolchain }}
          components: rustfmt, clippy

      - name: Install Rust toolchain (from rust-toolchain.toml or stable)
        if: inputs.rust_toolchain == ''
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: ${{ inputs.working_directory }}

      - name: cargo fmt --check
        id: fmt
        working-directory: ${{ inputs.working_directory }}
        run: cargo fmt --check

      - name: cargo clippy
        id: clippy
        working-directory: ${{ inputs.working_directory }}
        run: cargo clippy --no-deps -- ${{ inputs.clippy_args }}

      - name: Summary
        if: always()
        env:
          WD: ${{ inputs.working_directory }}
          FMT_OUTCOME: ${{ steps.fmt.outcome }}
          CLIPPY_OUTCOME: ${{ steps.clippy.outcome }}
        run: |
          glyph() {
            case "$1" in
              success) echo "✓" ;;
              failure) echo "✗" ;;
              skipped) echo "−" ;;
              *)       echo "?" ;;
            esac
          }
          if [[ "$FMT_OUTCOME" == "success" && "$CLIPPY_OUTCOME" == "success" ]]; then
            result="✓ passed"
          else
            result="✗ failed"
          fi
          {
            echo "## lint-rust"
            echo ""
            echo "**Tools:** cargo fmt, cargo clippy"
            echo "**Working dir:** \`${WD}\`"
            echo "**Result:** ${result}"
            echo ""
            echo "| Check | Status |"
            echo "|---|---|"
            echo "| cargo fmt --check | $(glyph "$FMT_OUTCOME") |"
            echo "| cargo clippy | $(glyph "$CLIPPY_OUTCOME") |"
          } >> "$GITHUB_STEP_SUMMARY" || true
