# .github/workflows/test-rust.yml
# Reusable workflow: run cargo test + cargo-llvm-cov coverage gate.
# Summary convention: docs/conventions/step-summary.md
name: test-rust
on:
  workflow_call:
    inputs:
      runs_on:
        description: 'JSON-encoded array of runner labels.'
        required: false
        type: string
        default: '["self-hosted","Linux","X64"]'
      working_directory:
        description: 'Crate root directory.'
        required: false
        type: string
        default: '.'
      rust_toolchain:
        description: 'rustup toolchain. Empty → rustup defaults.'
        required: false
        type: string
        default: ''
      coverage_threshold:
        description: 'Minimum line coverage percentage (integer 0-100).'
        required: false
        type: number
        default: 80
      # renovate: datasource=github-releases depName=taiki-e/cargo-llvm-cov extractVersion=^v(?<version>.+)$
      cargo_llvm_cov_version:
        description: 'cargo-llvm-cov release version (bare semver — taiki-e/install-action rejects a leading v).'
        required: false
        type: string
        default: '0.6.16'

permissions:
  contents: read

concurrency:
  group: test-rust-${{ github.workflow }}-${{ github.ref }}-${{ inputs.working_directory }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    runs-on: ${{ fromJSON(inputs.runs_on) }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install Rust toolchain (explicit)
        if: inputs.rust_toolchain != ''
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: ${{ inputs.rust_toolchain }}
          components: llvm-tools-preview

      - name: Install Rust toolchain (default)
        if: inputs.rust_toolchain == ''
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: ${{ inputs.working_directory }}

      - uses: taiki-e/install-action@920ab1831fbf4fb3ef75c8ead83556c918bb7290 # v2
        with:
          tool: cargo-llvm-cov@${{ inputs.cargo_llvm_cov_version }}

      - name: cargo llvm-cov with threshold
        id: coverage
        working-directory: ${{ inputs.working_directory }}
        env:
          THRESHOLD: ${{ inputs.coverage_threshold }}
        run: |
          set -o pipefail
          rc=0
          cargo llvm-cov --summary-only --fail-under-lines "$THRESHOLD" | tee llvm-cov.out || rc=$?
          # Re-run with --json to extract line-coverage precisely (text TOTAL row's last % is branch, not line).
          cargo llvm-cov report --json --output-path llvm-cov.json >/dev/null 2>&1 || true
          if [[ -f llvm-cov.json ]] && command -v jq >/dev/null 2>&1; then
            pct=$(jq -r '.data[0].totals.lines.percent | tostring | .[0:5]' llvm-cov.json 2>/dev/null)
          else
            # Fallback: position-based parse of the TOTAL row. cargo-llvm-cov's --summary-only
            # currently emits 13 columns; line coverage is the 10th field (after Lines / Missed Lines).
            pct=$(awk '/^TOTAL/ {gsub("%","",$10); print $10}' llvm-cov.out)
          fi
          echo "coverage_pct=${pct:-N/A}" >> "$GITHUB_OUTPUT"
          echo "threshold=${THRESHOLD}" >> "$GITHUB_OUTPUT"
          exit "$rc"

      - name: Summary
        if: always()
        env:
          WD: ${{ inputs.working_directory }}
          COVERAGE_OUTCOME: ${{ steps.coverage.outcome }}
          PCT: ${{ steps.coverage.outputs.coverage_pct }}
          THRESHOLD: ${{ steps.coverage.outputs.threshold }}
        run: |
          if [[ "$COVERAGE_OUTCOME" == "success" ]]; then
            result="✓ coverage ${PCT}% ≥ threshold ${THRESHOLD}%"
          elif [[ -n "$PCT" && "$PCT" != "N/A" ]]; then
            result="✗ coverage ${PCT}% < threshold ${THRESHOLD}% (or tests failed)"
          else
            result="✗ tests failed"
          fi
          {
            echo "## test-rust"
            echo ""
            echo "**Tool:** cargo-llvm-cov"
            echo "**Working dir:** \`${WD}\`"
            echo "**Result:** ${result}"
            echo ""
            echo "| Metric | Value |"
            echo "|---|---|"
            echo "| Coverage | ${PCT:-N/A}% |"
            echo "| Threshold | ${THRESHOLD}% |"
          } >> "$GITHUB_STEP_SUMMARY" || true
