# .github/workflows/test-rust.yml
# Reusable workflow: run cargo test + cargo-llvm-cov coverage gate.
name: test-rust
on:
  workflow_call:
    inputs:
      runs_on:
        description: 'JSON-encoded array of runner labels.'
        required: false
        type: string
        default: '["self-hosted","Linux","X64"]'
      working_directory:
        description: 'Crate root directory.'
        required: false
        type: string
        default: '.'
      rust_toolchain:
        description: 'rustup toolchain. Empty → rustup defaults.'
        required: false
        type: string
        default: ''
      coverage_threshold:
        description: 'Minimum line coverage percentage (integer 0-100).'
        required: false
        type: number
        default: 80
      # renovate: datasource=github-releases depName=taiki-e/cargo-llvm-cov
      cargo_llvm_cov_version:
        description: 'cargo-llvm-cov release tag.'
        required: false
        type: string
        default: 'v0.6.16'

permissions:
  contents: read

concurrency:
  group: test-rust-${{ github.workflow }}-${{ github.ref }}-${{ inputs.working_directory }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    runs-on: ${{ fromJSON(inputs.runs_on) }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain (explicit)
        if: inputs.rust_toolchain != ''
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.rust_toolchain }}
          components: llvm-tools-preview

      - name: Install Rust toolchain (default)
        if: inputs.rust_toolchain == ''
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ inputs.working_directory }}

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov@${{ inputs.cargo_llvm_cov_version }}

      - name: cargo llvm-cov with threshold
        id: coverage
        working-directory: ${{ inputs.working_directory }}
        env:
          THRESHOLD: ${{ inputs.coverage_threshold }}
        run: |
          set -o pipefail
          cargo llvm-cov --summary-only --fail-under-lines "$THRESHOLD" | tee llvm-cov.out
          # `--summary-only` prints a table; the `TOTAL` row's last field is the
          # line-coverage percentage (e.g., `85.42%`). awk strips the trailing %.
          pct=$(awk '/^TOTAL/ {gsub("%","",$NF); print $NF}' llvm-cov.out)
          echo "coverage_pct=${pct:-N/A}" >> "$GITHUB_OUTPUT"
          echo "threshold=${THRESHOLD}" >> "$GITHUB_OUTPUT"

      - name: Summary
        if: always()
        env:
          WD: ${{ inputs.working_directory }}
          COVERAGE_OUTCOME: ${{ steps.coverage.outcome }}
          PCT: ${{ steps.coverage.outputs.coverage_pct }}
          THRESHOLD: ${{ steps.coverage.outputs.threshold }}
        run: |
          if [[ "$COVERAGE_OUTCOME" == "success" ]]; then
            result="✓ coverage ${PCT}% ≥ threshold ${THRESHOLD}%"
          elif [[ -n "$PCT" && "$PCT" != "N/A" ]]; then
            result="✗ coverage ${PCT}% < threshold ${THRESHOLD}% (or tests failed)"
          else
            result="✗ tests failed"
          fi
          {
            echo "## test-rust"
            echo ""
            echo "**Tool:** cargo test, cargo-llvm-cov"
            echo "**Working dir:** \`${WD}\`"
            echo "**Result:** ${result}"
            echo ""
            echo "| Metric | Value |"
            echo "|---|---|"
            echo "| Coverage | ${PCT:-N/A}% |"
            echo "| Threshold | ${THRESHOLD}% |"
          } >> "$GITHUB_STEP_SUMMARY" || true
