# .github/workflows/lint-helm.yml
# Reusable workflow: lint Helm chart(s) with `helm lint` + `ct lint`.
# Summary convention: docs/conventions/step-summary.md
name: lint-helm
on:
  workflow_call:
    inputs:
      runs_on:
        description: 'JSON-encoded array of runner labels.'
        required: false
        type: string
        default: '["self-hosted","Linux"]'
      working_directory:
        description: 'Repo root for ct (charts_dir is relative to this).'
        required: false
        type: string
        default: '.'
      charts_dir:
        description: 'Directory containing one or more charts (relative to working_directory).'
        required: false
        type: string
        default: 'charts'
      # renovate: datasource=github-releases depName=helm/helm
      helm_version:
        description: 'Helm CLI version.'
        required: false
        type: string
        default: 'v3.16.3'
      # renovate: datasource=github-releases depName=helm/chart-testing
      ct_version:
        description: 'chart-testing (ct) version.'
        required: false
        type: string
        default: 'v3.11.0'

permissions:
  contents: read

concurrency:
  group: lint-helm-${{ github.workflow }}-${{ github.ref }}-${{ inputs.working_directory }}-${{ inputs.charts_dir }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    runs-on: ${{ fromJSON(inputs.runs_on) }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0   # ct needs git history for --target-branch diff

      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5
        with:
          version: ${{ inputs.helm_version }}

      - uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f # v2.8.0
        with:
          version: ${{ inputs.ct_version }}

      - name: helm lint (all charts)
        id: helm_lint
        working-directory: ${{ inputs.working_directory }}
        env:
          CHARTS_DIR: ${{ inputs.charts_dir }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          # If charts_dir is itself a chart, lint it directly; else lint each subdir that has Chart.yaml.
          if [[ -f "$CHARTS_DIR/Chart.yaml" ]]; then
            helm lint "$CHARTS_DIR"
          else
            found=0
            for d in "$CHARTS_DIR"/*/; do
              if [[ -f "${d%/}/Chart.yaml" ]]; then
                helm lint "${d%/}"
                found=1
              fi
            done
            if (( found == 0 )); then
              echo "::error::no chart found in $CHARTS_DIR (no Chart.yaml in $CHARTS_DIR or its immediate subdirs)"
              exit 1
            fi
          fi

      - name: ct lint
        id: ct_lint
        working-directory: ${{ inputs.working_directory }}
        run: |
          ct lint --all --validate-maintainers=false \
            --chart-dirs="${{ inputs.charts_dir }}" \
            --target-branch="${{ github.base_ref || 'main' }}"

      - name: Summary
        if: always()
        env:
          WD: ${{ inputs.working_directory }}
          CHARTS_DIR: ${{ inputs.charts_dir }}
          HELM_LINT_OUTCOME: ${{ steps.helm_lint.outcome }}
          CT_LINT_OUTCOME: ${{ steps.ct_lint.outcome }}
        run: |
          glyph() {
            case "$1" in
              success) echo "✓" ;;
              failure) echo "✗" ;;
              skipped) echo "−" ;;
              *)       echo "?" ;;
            esac
          }
          if [[ "$HELM_LINT_OUTCOME" == "success" && "$CT_LINT_OUTCOME" == "success" ]]; then
            result="✓ passed"
          else
            result="✗ failed"
          fi
          {
            echo "## lint-helm"
            echo ""
            echo "**Tools:** helm lint, chart-testing"
            echo "**Working dir:** \`${WD}\`"
            echo "**Charts dir:** \`${CHARTS_DIR}\`"
            echo "**Result:** ${result}"
            echo ""
            echo "| Check | Status |"
            echo "|---|---|"
            echo "| helm lint | $(glyph "$HELM_LINT_OUTCOME") |"
            echo "| ct lint | $(glyph "$CT_LINT_OUTCOME") |"
          } >> "$GITHUB_STEP_SUMMARY" || true
