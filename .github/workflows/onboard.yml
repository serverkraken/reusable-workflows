# .github/workflows/onboard.yml
# Operational tool: dispatches per-target onboarding PRs into serverkraken/* repos.
# Not a public reusable workflow's API surface — input contract may evolve without semver bump.
# See docs/superpowers/specs/2026-05-16-onboarding-workflow-design.md.
# Summary convention: docs/conventions/step-summary.md
name: onboard
on:
  workflow_dispatch:
    inputs:
      target_repos:
        description: 'Comma-separated owner/repo list (e.g. serverkraken/blupod-ui,serverkraken/flow)'
        required: true
        type: string
      language:
        description: 'auto = detect, otherwise force release-type'
        required: false
        type: choice
        default: auto
        options: [auto, go, python, rust, helm, node, simple]
      dry_run:
        description: 'Render + log diff; do NOT push or open PRs'
        required: false
        type: boolean
        default: false
      use_go_cli:
        description: 'Use sk-workflows detect (Go) instead of scripts/onboard-detect.sh (Bash).'
        required: false
        type: boolean
        default: false
      # pin_version: Catalog @version that rendered templates pin to.
      # When a new catalog major releases, bump this default, the matching
      # one in the workflow_call inputs block below, AND the ${PIN_VERSION:-vN}
      # fallback in the "Update docs/onboarding-status.md" step further below.
      pin_version:
        description: 'Catalog @version that rendered templates pin to'
        required: false
        type: string
        default: v4
      rendered_against:
        description: 'Full catalog tag for the lock file. Empty → fall back to pin_version.'
        required: false
        type: string
        default: ''
      add_branch_name:
        description: 'Branch for PR A (add new workflows)'
        required: false
        type: string
        default: chore/onboard-reusable-workflows
      cleanup_branch_name:
        description: 'Branch for PR B (remove legacy workflows)'
        required: false
        type: string
        default: chore/remove-legacy-workflows
  workflow_call:
    inputs:
      target_repos:
        required: true
        type: string
      language:
        required: false
        type: string
        default: auto
      dry_run:
        required: false
        type: boolean
        default: true
      use_go_cli:
        required: false
        type: boolean
        default: false
      pin_version:
        required: false
        type: string
        default: v4
      rendered_against:
        description: 'Full catalog tag for the lock file. Empty → fall back to pin_version.'
        required: false
        type: string
        default: ''
      add_branch_name:
        required: false
        type: string
        default: chore/onboard-reusable-workflows
      cleanup_branch_name:
        required: false
        type: string
        default: chore/remove-legacy-workflows

concurrency:
  # Hardcoded prefix per CLAUDE-patterns "concurrency group" rule.
  group: onboard-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  parse-inputs:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      matrix: ${{ steps.parse.outputs.matrix }}
    steps:
      - id: parse
        env:
          REPOS: ${{ inputs.target_repos }}
        run: |
          set -euo pipefail
          IFS=',' read -ra raw <<< "$REPOS"
          declare -A seen=()
          out='['
          first=1
          for entry in "${raw[@]}"; do
            entry="${entry//[[:space:]]/}"
            [[ -z "$entry" ]] && continue
            if [[ ! "$entry" =~ ^serverkraken/[A-Za-z0-9._-]+$ ]]; then
              echo "::error::invalid target_repos entry: '$entry' (must match ^serverkraken/[A-Za-z0-9._-]+\$)"
              exit 1
            fi
            if [[ -n "${seen[$entry]:-}" ]]; then
              continue
            fi
            seen[$entry]=1
            owner="${entry%/*}"
            name="${entry#*/}"
            if [[ $first -eq 0 ]]; then out+=','; fi
            out+="{\"target\":\"$entry\",\"owner\":\"$owner\",\"name\":\"$name\"}"
            first=0
          done
          out+=']'
          if [[ "$out" == "[]" ]]; then
            echo "::error::target_repos is empty after parse"
            exit 1
          fi
          echo "matrix=$out" >> "$GITHUB_OUTPUT"
          echo "Parsed matrix: $out"

  onboard:
    needs: parse-inputs
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJSON(needs.parse-inputs.outputs.matrix) }}
    steps:
      - name: Begin summary
        if: always()
        env:
          TARGET: ${{ matrix.target.target }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          if [[ "$DRY_RUN" == "true" ]]; then
            mode="dry-run (no PR push)"
          else
            mode="apply"
          fi
          {
            echo "## onboard"
            echo ""
            echo "**Tool:** onboard render+PR"
            echo "**Target:** \`${TARGET}\`"
            echo "**Mode:** ${mode}"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY" || true

      - name: Mint App token scoped to target
        id: target-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          client-id: ${{ secrets.RELEASE_PLEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_APP_PRIVATE_KEY }}
          owner: ${{ matrix.target.owner }}
          repositories: ${{ matrix.target.name }}

      # Code scanning needs `code_security` enabled on private repos before
      # SARIF upload works. Public repos get code-scanning for free and don't
      # have this knob, so we GET visibility first and skip non-private.
      # `continue-on-error` so a 403 (App permissions not granted/propagated)
      # doesn't sink the onboard run — adopters with `code_security` already
      # enabled or a different policy can still onboard, they just won't get
      # SARIF reports until that's resolved manually.
      - name: Enable code_security on private targets
        continue-on-error: true
        env:
          GH_TOKEN: ${{ steps.target-token.outputs.token }}
          TARGET: ${{ matrix.target.target }}
        run: |
          set -euo pipefail
          visibility=$(gh api "/repos/$TARGET" --jq '.visibility')
          if [[ "$visibility" != "private" ]]; then
            echo "Skipping code_security enable for $TARGET (visibility=$visibility)"
            exit 0
          fi
          current=$(gh api "/repos/$TARGET" --jq '.security_and_analysis.code_security.status // "absent"')
          if [[ "$current" == "enabled" ]]; then
            echo "code_security already enabled on $TARGET — no-op"
            exit 0
          fi
          echo "Enabling code_security on $TARGET (was $current)"
          echo '{"security_and_analysis":{"code_security":{"status":"enabled"}}}' \
            | gh api --method PATCH "/repos/$TARGET" --input - > /dev/null

      - name: Checkout target repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: ${{ matrix.target.target }}
          token: ${{ steps.target-token.outputs.token }}
          path: target
          fetch-depth: 0

      - name: Checkout catalog at this workflow's SHA
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: serverkraken/reusable-workflows
          ref: ${{ github.workflow_sha }}
          path: .catalog

      - name: Detect language and version
        id: detect
        uses: ./.catalog/actions/onboard-detect
        with:
          repo_path: target
          language_override: ${{ inputs.language }}
          target_repo: ${{ matrix.target.target }}
          github_token: ${{ steps.target-token.outputs.token }}
          use_go_cli: ${{ inputs.use_go_cli }}

      - name: Install gomplate (needed by onboard-render)
        run: sudo ${{ github.workspace }}/.catalog/scripts/install-gomplate.sh

      - name: Snapshot previous defaults marker
        id: snap_defaults
        working-directory: target
        run: |
          set -euo pipefail
          if [[ -f .github/onboard.lock.json ]]; then
            prev=$(jq -r '.defaults_applied_at // ""' .github/onboard.lock.json)
          else
            prev=""
          fi
          echo "prev=$prev" >> "$GITHUB_OUTPUT"

      - name: Render templates into target
        uses: ./.catalog/actions/onboard-render
        with:
          catalog_path: .catalog
          target_path: target
          profile_json: ${{ steps.detect.outputs.profile_json }}
          pin_version: ${{ inputs.pin_version }}
          rendered_against: ${{ inputs.rendered_against }}
          use_go_cli: ${{ inputs.use_go_cli }}

      - name: Apply repo defaults
        uses: ./.catalog/actions/onboard-apply-defaults
        with:
          token: ${{ steps.target-token.outputs.token }}
          target_repo: ${{ matrix.target.target }}
          target_path: target
          prev_defaults_applied_at: ${{ steps.snap_defaults.outputs.prev }}
          dry_run: ${{ inputs.dry_run }}

      - name: Stage rendered files and log diff
        working-directory: target
        env:
          PROFILE: ${{ steps.detect.outputs.profile_json }}
        run: |
          set -euo pipefail
          git add -A
          echo "### Rendered diff for ${{ matrix.target.target }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```diff' >> "$GITHUB_STEP_SUMMARY"
          git --no-pager diff --cached --stat >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          git --no-pager diff --cached --stat
          git --no-pager diff --cached

          # Append profile-driven components table for human sanity-check.
          {
            echo ""
            echo "### Detected components"
            echo "| Path | Role | Languages | Dockerfiles |"
            echo "| --- | --- | --- | --- |"
            echo "$PROFILE" | jq -r '.components[] |
              "| \(.path) | \(.role) | \(.languages|join(",")) | \(.dockerfiles|length) |"'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Branch A — ensure add-workflows PR
        if: ${{ !inputs.dry_run }}
        id: pr_a
        working-directory: target
        env:
          GH_TOKEN: ${{ steps.target-token.outputs.token }}
          DEFAULT_BRANCH: ${{ steps.detect.outputs.default_branch }}
          ADD_BRANCH: ${{ inputs.add_branch_name }}
          TARGET_REPO: ${{ matrix.target.target }}
          PIN: ${{ inputs.pin_version }}
          PROFILE: ${{ steps.detect.outputs.profile_json }}
        run: |
          set -euo pipefail
          # Bot identity: id is public and stable; fetched inline so we never
          # commit a hardcoded numeric id that could drift.
          bot_id=$(gh api '/users/serverkraken-release-bot[bot]' -q '.id')
          git config user.name 'serverkraken-release-bot[bot]'
          git config user.email "${bot_id}+serverkraken-release-bot[bot]@users.noreply.github.com"

          # Target already has rendered files staged (from prior step's "git add -A").
          # Reset index, then re-add exactly the files onboard-render.sh wrote.
          # The lock file is the authoritative manifest: its `.files` keys are
          # every rendered path for THIS variant, so the set tracks the renderer
          # instead of a hardcoded array that silently drifts. A release profile
          # renders the full release-please set; a gitops profile renders ci.yml
          # only; the prerelease-on-push opt-in adds one more file — all three
          # are reflected in the lock without changes here.
          git reset

          LOCK=".github/onboard.lock.json"
          [[ -f "$LOCK" ]] || { echo "::error::lock file missing: $LOCK"; exit 1; }
          mapfile -t RENDERED < <(jq -r '.files | keys[]' "$LOCK")
          # The lock does not list itself; stage it alongside the rendered files.
          RENDERED+=("$LOCK")
          # Defensive guard: every path the lock claims must exist on disk.
          for f in "${RENDERED[@]}"; do
            [[ -f "$f" ]] || { echo "::error::expected rendered file missing: $f"; exit 1; }
          done

          # Create / reset the bot branch from default HEAD; rendered files are working-tree
          # mods so they survive `checkout -B`.
          git fetch origin "$DEFAULT_BRANCH"
          git checkout -B "$ADD_BRANCH" "origin/$DEFAULT_BRANCH"

          git add "${RENDERED[@]}"

          existing_pr_num=$(gh pr list --repo "$TARGET_REPO" --head "$ADD_BRANCH" --state open --json number -q '.[0].number' || echo "")

          if git diff --cached --quiet; then
            echo "No diff for add branch."
            if [[ -n "$existing_pr_num" ]]; then
              gh pr close "$existing_pr_num" --repo "$TARGET_REPO" --comment "No changes needed; closing." || true
            fi
            echo "pr_a_url=" >> "$GITHUB_OUTPUT"
            echo "pr_a_status=no-changes" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m "chore: onboard serverkraken/reusable-workflows@${PIN}"
          git push -f origin "$ADD_BRANCH"

          # Build profile-driven markdown blocks for the PR body so the reviewer
          # can sanity-check what detection saw before merging.
          components_md=$(echo "$PROFILE" | jq -r '
            .components[] |
            "- `\(.path)` — role=`\(.role)`, languages=\(.languages|join(",")), dockerfiles=\(.dockerfiles|length)"
          ')
          # Warnings are objects {code, path, message} from emit_*_warnings in
          # onboard-detect-lib.sh — extract human-readable fields for the PR body.
          warnings_md=$(echo "$PROFILE" | jq -r '.warnings // [] | map("- `\(.code)` at `\(.path)` — \(.message)") | join("\n")')
          # legacy_ci entries split into "PR-B will remove" (non-empty
          # replaced_by — confident replacement exists) vs "manual review"
          # (empty replaced_by — unrecognized; PR-B leaves them alone).
          # This mirrors PR-B's actual deletion logic so the body never
          # promises a removal that doesn't happen.
          to_remove_md=$(echo "$PROFILE" | jq -r '
            .legacy_ci // [] |
            map(select(.replaced_by | length > 0)) |
            map("- `\(.path)` — \(.summary)") |
            join("\n")
          ')
          manual_review_md=$(echo "$PROFILE" | jq -r '
            .legacy_ci // [] |
            map(select(.replaced_by | length == 0)) |
            map("- `\(.path)` — \(.summary)") |
            join("\n")
          ')
          # Post-merge guidance differs by variant. A gitops profile has no
          # release-please flow — ci.yml IS the whole pipeline — so promising a
          # release-please PR would be wrong. Branch on the profile's `gitops`
          # presence (same signal the renderer uses to emit ci.yml only).
          # shellcheck disable=SC2016  # backticks here are literal markdown code spans, not command substitution
          if [[ "$(echo "$PROFILE" | jq -r 'if (.gitops // null) != null then "y" else "n" end')" == "y" ]]; then
            next_steps_md='After merging, `ci.yml` validates Kubernetes manifests (kube-validate), '
            next_steps_md+='runs kube-linter (kube-lint), and scans for secrets (secret-scan) on every push and PR. '
            next_steps_md+='GitOps repos keep their existing release flow — no release-please PR is created.'
          else
            next_steps_md=$(printf 'After merging:\n1. Push a `feat:` / `fix:` commit to `%s` — `release.yml` should open a release-please PR.' "$DEFAULT_BRANCH")
            next_steps_md+=$'\n2. Merge that release-please PR. A release + image build + Trivy scan should run end-to-end.'
            next_steps_md+=$'\n3. Once one full release has run green, merge the companion cleanup PR (if open) to retire legacy workflow files.'
          fi

          body=$(cat <<EOF
          ## Onboard to serverkraken/reusable-workflows@${PIN}

          Renders the standard reusable-workflow consumer files plus a tracking
          \`.github/onboard.lock.json\` so future drift can be detected centrally.

          ### Detected shape
          ${components_md}

          ${warnings_md:+#### Warnings
          ${warnings_md}
          }
          ${to_remove_md:+#### Legacy CI removed by companion PR B
          ${to_remove_md}
          }
          ${manual_review_md:+#### Legacy CI needing manual review
          These workflows were detected but have no catalog replacement yet; PR B leaves them in place.
          ${manual_review_md}
          }
          ${next_steps_md}

          _Opened by the \`onboard.yml\` workflow in \`serverkraken/reusable-workflows\`._
          EOF
          )

          if [[ -n "$existing_pr_num" ]]; then
            gh pr edit "$existing_pr_num" --repo "$TARGET_REPO" \
              --title "chore: onboard serverkraken/reusable-workflows@${PIN}" \
              --body "$body"
            pr_url=$(gh pr view "$existing_pr_num" --repo "$TARGET_REPO" --json url -q .url)
          else
            gh pr create --repo "$TARGET_REPO" \
                         --base "$DEFAULT_BRANCH" --head "$ADD_BRANCH" \
                         --title "chore: onboard serverkraken/reusable-workflows@${PIN}" \
                         --body "$body" >/dev/null
            pr_url=$(gh pr view "$ADD_BRANCH" --repo "$TARGET_REPO" --json url -q .url)
          fi
          echo "pr_a_url=$pr_url" >> "$GITHUB_OUTPUT"
          echo "pr_a_status=add-open" >> "$GITHUB_OUTPUT"

      - name: Branch B — ensure remove-legacy PR
        if: ${{ !inputs.dry_run }}
        id: pr_b
        working-directory: target
        env:
          GH_TOKEN: ${{ steps.target-token.outputs.token }}
          DEFAULT_BRANCH: ${{ steps.detect.outputs.default_branch }}
          CLEANUP_BRANCH: ${{ inputs.cleanup_branch_name }}
          TARGET_REPO: ${{ matrix.target.target }}
          PIN: ${{ inputs.pin_version }}
          PR_A_URL: ${{ steps.pr_a.outputs.pr_a_url }}
          PROFILE: ${{ steps.detect.outputs.profile_json }}
        run: |
          set -euo pipefail
          # Hard reset to default branch HEAD to discard rendered files from prior step;
          # cleanup PR works against the unmodified default branch.
          git fetch origin "$DEFAULT_BRANCH"
          git checkout "$DEFAULT_BRANCH"
          git reset --hard "origin/$DEFAULT_BRANCH"
          git clean -fd

          # Source of truth for what to delete: profile.legacy_ci from
          # detect_legacy_ci (scripts/lib/onboard-detect-lib.sh). Only entries
          # with non-empty replaced_by are removed — those are workflows where
          # a confident catalog replacement exists. "Unrecognized" legacy
          # (empty replaced_by) is left in place; the user reviews manually.
          # Prior to v4.2.1 this step used a hardcoded 6-name whitelist that
          # missed test-coverage.yml, docker-manual.yml, test.yml, etc.
          mapfile -t matched < <(
            echo "$PROFILE" | jq -r '
              .legacy_ci // [] |
              map(select(.replaced_by | length > 0)) |
              .[].path
            '
          )
          # Defensive: jq returns paths verbatim from detection; verify each
          # exists on the default branch before staging the deletion.
          present=()
          for f in "${matched[@]}"; do
            [[ -n "$f" && -f "$f" ]] && present+=("$f")
          done
          matched=("${present[@]+"${present[@]}"}")

          existing_pr_num=$(gh pr list --repo "$TARGET_REPO" --head "$CLEANUP_BRANCH" --state open --json number -q '.[0].number' || echo "")

          if (( ${#matched[@]} == 0 )); then
            echo "No legacy files in target."
            if [[ -n "$existing_pr_num" ]]; then
              gh pr close "$existing_pr_num" --repo "$TARGET_REPO" --comment "No legacy files to remove; closing." || true
            fi
            echo "pr_b_url=" >> "$GITHUB_OUTPUT"
            echo "pr_b_status=no-legacy" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git checkout -B "$CLEANUP_BRANCH" "origin/$DEFAULT_BRANCH"
          git rm "${matched[@]}"
          git commit -m "chore: remove legacy workflows superseded by reusable-workflows@${PIN}"
          git push -f origin "$CLEANUP_BRANCH"

          # Build a markdown bullet list of removed files for the PR body.
          removed_list=""
          for f in "${matched[@]}"; do
            removed_list+="- \`$f\`"$'\n'
          done

          pr_a_ref="(no companion PR opened)"
          if [[ -n "$PR_A_URL" ]]; then
            pr_a_ref="$PR_A_URL"
          fi

          body=$(cat <<EOF
          ## Retire legacy workflows

          Removes the following files, which are now covered by reusable workflows from \`serverkraken/reusable-workflows@${PIN}\`:

          ${removed_list}

          **Soft dependency:** companion PR ${pr_a_ref} ("onboard reusable-workflows") should be merged
          and have run at least one successful release before merging this PR.
          Otherwise this repo loses its release flow until the new one is exercised.

          _Opened by the \`onboard.yml\` workflow in \`serverkraken/reusable-workflows\`._
          EOF
          )

          if [[ -n "$existing_pr_num" ]]; then
            gh pr edit "$existing_pr_num" --repo "$TARGET_REPO" \
              --title "chore: remove legacy workflows superseded by reusable-workflows@${PIN}" \
              --body "$body"
            pr_url=$(gh pr view "$existing_pr_num" --repo "$TARGET_REPO" --json url -q .url)
          else
            gh pr create --repo "$TARGET_REPO" \
                         --base "$DEFAULT_BRANCH" --head "$CLEANUP_BRANCH" \
                         --title "chore: remove legacy workflows superseded by reusable-workflows@${PIN}" \
                         --body "$body" >/dev/null
            pr_url=$(gh pr view "$CLEANUP_BRANCH" --repo "$TARGET_REPO" --json url -q .url)
          fi
          echo "pr_b_url=$pr_url" >> "$GITHUB_OUTPUT"
          echo "pr_b_status=cleanup-open" >> "$GITHUB_OUTPUT"

      - name: Emit per-target result artifact
        if: always()
        env:
          TARGET: ${{ matrix.target.target }}
          LANG: ${{ steps.detect.outputs.language || '' }}
          CUR_VER: ${{ steps.detect.outputs.current_version || '' }}
          PR_A_URL: ${{ steps.pr_a.outputs.pr_a_url || '' }}
          # Distinguish deliberate dry-run skip from real failure so the summary table
          # doesn't show "error / error" on a successful dry-run.
          PR_A_STATUS: ${{ steps.pr_a.outputs.pr_a_status || (inputs.dry_run && 'dry-run' || 'error') }}
          PR_B_URL: ${{ steps.pr_b.outputs.pr_b_url || '' }}
          PR_B_STATUS: ${{ steps.pr_b.outputs.pr_b_status || (inputs.dry_run && 'dry-run' || 'error') }}
          JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail
          mkdir -p result
          # Sanitize target slash → dash for artifact name
          safe_name="${TARGET//\//-}"
          jq -n \
            --arg target "$TARGET" \
            --arg language "$LANG" \
            --arg version "$CUR_VER" \
            --arg pr_a_url "$PR_A_URL" \
            --arg pr_a_status "$PR_A_STATUS" \
            --arg pr_b_url "$PR_B_URL" \
            --arg pr_b_status "$PR_B_STATUS" \
            --arg job_status "$JOB_STATUS" \
            '{target: $target, language: $language, version: $version, pr_a_url: $pr_a_url, pr_a_status: $pr_a_status, pr_b_url: $pr_b_url, pr_b_status: $pr_b_status, job_status: $job_status}' \
            > "result/$safe_name.json"
          echo "Artifact contents:"
          cat "result/$safe_name.json"

      - name: Upload result artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: onboard-result-${{ matrix.target.owner }}-${{ matrix.target.name }}
          path: result/
          retention-days: 7

  finalize:
    needs: onboard
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      actions: read
    steps:
      - name: Mint App token for catalog repo
        id: catalog-token
        if: ${{ !inputs.dry_run }}
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          client-id: ${{ secrets.RELEASE_PLEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_APP_PRIVATE_KEY }}
          owner: serverkraken
          repositories: reusable-workflows

      - name: Checkout catalog on main
        if: ${{ !inputs.dry_run }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: serverkraken/reusable-workflows
          ref: main
          token: ${{ steps.catalog-token.outputs.token }}
          fetch-depth: 0

      - name: Download all result artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: results
          pattern: onboard-result-*
          merge-multiple: true

      - name: Build step summary table
        id: summary
        run: |
          set -euo pipefail
          {
            echo "### Onboarding run summary"
            echo ""
            echo "| Repository | Language | Version | Add PR | Cleanup PR | Status |"
            echo "|---|---|---|---|---|---|"
            for f in results/*.json; do
              [[ -f "$f" ]] || continue
              target=$(jq -r '.target' "$f")
              lang=$(jq -r '.language' "$f")
              ver=$(jq -r '.version' "$f")
              pa=$(jq -r '.pr_a_url' "$f")
              pas=$(jq -r '.pr_a_status' "$f")
              pb=$(jq -r '.pr_b_url' "$f")
              pbs=$(jq -r '.pr_b_status' "$f")
              js=$(jq -r '.job_status' "$f")

              if [[ "$pas" == "dry-run" && "$pbs" == "dry-run" ]]; then
                combined="dry-run (rendered diff in logs)"
              elif [[ "$pas" == "no-changes" && "$pbs" == "no-legacy" ]]; then
                combined="complete"
              elif [[ "$pas" == "no-changes" && "$pbs" == "cleanup-open" ]]; then
                combined="cleanup-open"
              elif [[ "$pas" == "add-open" && "$pbs" == "no-legacy" ]]; then
                combined="add-open, no-legacy"
              elif [[ "$pas" == "add-open" && "$pbs" == "cleanup-open" ]]; then
                combined="add-open, cleanup-open"
              else
                combined="$pas / $pbs"
              fi
              if [[ "$js" != "success" ]]; then
                combined="error ($combined)"
              fi

              pa_md="—"
              pb_md="—"
              [[ -n "$pa" ]] && pa_md="[link]($pa)"
              [[ -n "$pb" ]] && pb_md="[link]($pb)"
              echo "| $target | $lang | $ver | $pa_md | $pb_md | $combined |"
            done
          } >> "$GITHUB_STEP_SUMMARY"

          # Also emit a machine-readable copy for the status-doc step.
          cp -r results results-for-status

      - name: Update docs/onboarding-status.md
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ steps.catalog-token.outputs.token }}
          PIN_VERSION: ${{ inputs.pin_version }}
        run: |
          set -euo pipefail
          bot_id=$(gh api '/users/serverkraken-release-bot[bot]' -q '.id')
          git config user.name 'serverkraken-release-bot[bot]'
          git config user.email "${bot_id}+serverkraken-release-bot[bot]@users.noreply.github.com"

          DOC=docs/onboarding-status.md
          if [[ ! -f "$DOC" ]]; then
            echo "::warning::$DOC missing — initializing"
            cat > "$DOC" <<EOF
          # Onboarding Status

          _Last updated by the onboarding workflow: $(date -u +%Y-%m-%dT%H:%M:%SZ)_

          | Repository | Onboarded | Catalog Version | Add PR | Cleanup PR | Status |
          |---|---|---|---|---|---|
          EOF
          fi

          # Re-derive "Last updated" line.
          stamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          sed -i "s|^_Last updated by the onboarding workflow:.*|_Last updated by the onboarding workflow: ${stamp}_|" "$DOC"

          # For each result, replace or append a row.
          for f in results-for-status/*.json; do
            [[ -f "$f" ]] || continue
            target=$(jq -r '.target' "$f")
            pa=$(jq -r '.pr_a_url' "$f")
            pas=$(jq -r '.pr_a_status' "$f")
            pb=$(jq -r '.pr_b_url' "$f")
            pbs=$(jq -r '.pr_b_status' "$f")
            js=$(jq -r '.job_status' "$f")

            if [[ "$pas" == "no-changes" && "$pbs" == "no-legacy" ]]; then
              status="complete"
            elif [[ "$pas" == "no-changes" && "$pbs" == "cleanup-open" ]]; then
              status="cleanup-open"
            elif [[ "$pas" == "add-open" && "$pbs" == "no-legacy" ]]; then
              status="add-open, no-legacy"
            elif [[ "$pas" == "add-open" && "$pbs" == "cleanup-open" ]]; then
              status="add-open, cleanup-open"
            else
              status="$pas / $pbs"
            fi
            if [[ "$js" != "success" ]]; then
              status="error ($status)"
            fi

            pa_md="—"
            pb_md="—"
            [[ -n "$pa" ]] && pa_md="[PR]($pa)"
            [[ -n "$pb" ]] && pb_md="[PR]($pb)"

            today=$(date -u +%Y-%m-%d)
            new_row="| $target | $today | ${PIN_VERSION:-v4} | $pa_md | $pb_md | $status |"

            # Replace existing row (matched by exact "| <target> |" at line start) or append.
            awk -v tgt="$target" -v row="$new_row" '
              BEGIN { replaced=0 }
              {
                if (index($0, "| " tgt " |") == 1) { print row; replaced=1 }
                else { print $0 }
              }
              END {
                if (!replaced) { print row }
              }
            ' "$DOC" > "$DOC.new" && mv "$DOC.new" "$DOC"
          done

          if git diff --quiet -- "$DOC"; then
            echo "No status doc changes."
            exit 0
          fi

          git add "$DOC"
          git commit -m "chore(onboard): update onboarding-status.md [skip ci]"
          git push origin main
