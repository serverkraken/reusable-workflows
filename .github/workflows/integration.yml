# .github/workflows/integration.yml
# Self-CI: exercises every atom against fixtures. Each atom gets at least
# one happy-path caller and (where applicable) one failure-path caller
# with a downstream assertion job that verifies failure occurred.
name: integration
on:
  pull_request:

# Workflow_call permission cap: the called atoms (docker-build,
# docker-build-multi, trivy-*) declare what they need. This block has to
# at minimum mirror the union, otherwise nested permissions are capped
# down. artifact-metadata is the new one (Anfang 2026) added for
# attest-build-provenance@v4's metadata persistence path.
permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write
  artifact-metadata: write
  security-events: write
  pull-requests: write
  actions: read

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ----- docker-build happy path -----
  # Happy path exercises sign + attest + sbom end-to-end so the catalog
  # itself verifies cosign works on the runner pool. Until 2026-05-20 the
  # ARC runner image lacked gettext-base/envsubst (cosign-installer prereq)
  # and these were forced false. The custom actions-runner-image cutover
  # bakes gettext-base, so flipping these true also serves as the proof
  # that downstream repos (actions-runner-image, etc.) can run sign:true.
  test-docker-build:
    uses: ./.github/workflows/docker-build.yml
    secrets: inherit
    with:
      tag: ''
      prerelease: true
      context: tests/fixtures/minimal-go
      dockerfile: tests/fixtures/minimal-go/Dockerfile
      image_name: ${{ github.repository }}/test-fixture
      sign: true
      attest: true
      sbom: true

  # ----- trivy-image happy path (no findings against clean fixture) -----
  test-trivy-image-happy:
    needs: test-docker-build
    uses: ./.github/workflows/trivy-image.yml
    secrets: inherit
    with:
      image_ref: ${{ needs.test-docker-build.outputs.image_ref }}
      fail_on_findings: false
      upload_sarif: false

  assert-trivy-image-clean:
    needs: test-trivy-image-happy
    runs-on: ubuntu-latest
    steps:
      - name: Verify findings_count == 0
        env:
          COUNT: ${{ needs.test-trivy-image-happy.outputs.findings_count }}
        run: |
          if [[ "$COUNT" != "0" ]]; then
            echo "::error::Expected 0 findings on clean fixture, got $COUNT"
            exit 1
          fi

  # ----- trivy-fs happy path -----
  test-trivy-fs-happy:
    uses: ./.github/workflows/trivy-fs.yml
    secrets: inherit
    with:
      paths_ignore: |
        tests/fixtures/with-secret
        tests/fixtures/lint-test/helm-lint-fail
      fail_on_findings: false
      upload_sarif: false

  # ----- trivy-fs failure path: must detect secrets on the secret fixture -----
  test-trivy-fs-failure:
    uses: ./.github/workflows/trivy-fs.yml
    secrets: inherit
    with:
      paths_ignore: |
        tests/fixtures/lint-test/helm-lint-fail
      upload_sarif: false
      fail_on_findings: false   # don't fail the job; we assert on findings_count below

  assert-trivy-fs-finds-secrets:
    needs: test-trivy-fs-failure
    runs-on: ubuntu-latest
    steps:
      - name: Verify findings_count > 0
        env:
          COUNT: ${{ needs.test-trivy-fs-failure.outputs.findings_count }}
        run: |
          if [[ "$COUNT" == "0" ]]; then
            echo "::error::Expected secret findings on with-secret fixture, got 0"
            exit 1
          fi
          echo "trivy-fs correctly detected $COUNT findings"

  # ----- trivy-image failure path: CVE fixture must have findings -----
  test-docker-build-cve:
    uses: ./.github/workflows/docker-build.yml
    secrets: inherit
    with:
      tag: ''
      prerelease: true
      context: tests/fixtures/with-cve
      dockerfile: tests/fixtures/with-cve/Dockerfile
      image_name: ${{ github.repository }}/test-fixture-cve
      sign: false
      attest: false
      sbom: false

  test-trivy-image-cve:
    needs: test-docker-build-cve
    uses: ./.github/workflows/trivy-image.yml
    secrets: inherit
    with:
      image_ref: ${{ needs.test-docker-build-cve.outputs.image_ref }}
      ignore_unfixed: false   # alpine:3.15 HIGH/CRITICAL CVEs all have upstream fixes; without this the test detects 0
      fail_on_findings: false   # don't fail the job; we assert on findings_count below
      upload_sarif: false

  assert-trivy-image-cve-finds-vulns:
    needs: test-trivy-image-cve
    runs-on: ubuntu-latest
    steps:
      - name: Verify findings_count > 0
        env:
          COUNT: ${{ needs.test-trivy-image-cve.outputs.findings_count }}
        run: |
          if [[ "$COUNT" == "0" ]]; then
            echo "::error::Expected CVEs on alpine:3.15 fixture, got 0"
            exit 1
          fi
          echo "trivy-image correctly detected $COUNT vulns"

  # ----- cleanup-images smoke: verify the workflow accepts inputs -----
  # Runs after all image scans complete so prerelease tags aren't deleted
  # before scanning finishes.
  test-cleanup-images:
    needs:
      - test-trivy-image-happy
      - assert-trivy-image-cve-finds-vulns
    uses: ./.github/workflows/cleanup-images.yml
    with:
      package_name: ${{ github.event.repository.name }}/test-fixture
      keep_stable_versions: 1000
      prerelease_age_days: 365
      runs_on: '["ubuntu-latest"]'

  # ----- onboard dry-run: exercise detect + render against the catalog itself -----
  test-onboard-dry-run:
    uses: ./.github/workflows/onboard.yml
    with:
      target_repos: serverkraken/reusable-workflows
      language: auto
      dry_run: true
      pin_version: v1
    secrets: inherit

  # ----- vars coercion: verify type=number + type=boolean inputs accept
  #       string-valued GHA expressions, which is what the SK_* override
  #       pattern emits in adopter ci.yml. The fixture ships with a smoke
  #       test giving 100% coverage so the coverage gate PASSES against
  #       threshold 70 — the assert job below greps the gate's log for
  #       `threshold: 70%` to prove the string '70' from `vars.X || '70'`
  #       was coerced into the type=number input. Green-when-coercion-works
  #       / red-when-broken.
  #
  #       The vars.NONEXISTENT_*_FOR_COERCION_TEST references intentionally
  #       point at variables that don't exist — the || fallback always
  #       fires, evaluating to a literal string ('70', 'false'). If the
  #       atom accepts that as the correct number / boolean, our SK_*
  #       override pattern works in production.
  #
  #       Inlined into integration.yml (rather than a tests/callers/*.yml
  #       file) because GitHub Actions only resolves local `uses:` paths
  #       under .github/workflows/.
  test-vars-coercion:
    uses: ./.github/workflows/test-go.yml
    secrets: inherit
    with:
      working_directory: tests/fixtures/minimal-go
      go_version: '1.22'
      coverage_threshold: ${{ fromJSON(vars.NONEXISTENT_NUMBER_FOR_COERCION_TEST || '70') }}
      cgo_enabled: ${{ fromJSON(vars.NONEXISTENT_BOOL_FOR_COERCION_TEST || 'false') }}

  assert-vars-coercion-ran-numerically:
    needs: test-vars-coercion
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Look up the test-vars-coercion job's coverage-gate log
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          # Look up the specific completed job by name; fetching per-job logs is
          # more reliable than the zip-format whole-run log on in-progress runs.
          # The inner reusable test-go.yml job is named `test`, so when called
          # from the `test-vars-coercion` job above it surfaces in the run as
          # `test-vars-coercion / test`.
          job_id=$(gh run view "$RUN_ID" \
            --json jobs \
            --jq '.jobs[] | select(.name | contains("test-vars-coercion / test")) | .databaseId' \
            | head -1)
          if [[ -z "$job_id" ]]; then
            echo "::error::could not find test-vars-coercion / test job in run $RUN_ID"
            exit 1
          fi
          # Retry up to 3 times for log eventual-consistency on freshly completed jobs.
          for attempt in 1 2 3; do
            if gh run view --job "$job_id" --log | grep -F "threshold: 70%"; then
              echo "vars.* → number coercion verified (attempt $attempt)"
              exit 0
            fi
            echo "attempt $attempt: log fetch returned no 'threshold: 70%' line yet, retrying in 10s"
            sleep 10
          done
          echo "::error::expected 'threshold: 70%' in coverage-gate log — GHA type coercion may be broken"
          exit 1
