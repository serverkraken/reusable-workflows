# .github/workflows/integration.yml
# Self-CI: exercises every atom against fixtures. Each atom gets at least
# one happy-path caller and (where applicable) one failure-path caller
# with a downstream assertion job that verifies failure occurred.
name: integration
on:
  pull_request:

# Workflow_call permission cap: the called atoms (docker-build,
# docker-build-multi, trivy-*, semantic-release) declare what they need.
# This block has to at minimum mirror the union, otherwise nested
# permissions are capped down. contents:write + issues:write are needed
# by semantic-release (added 2026-05-22 with the test-semantic-release-dry-run
# integration job). attestations / artifact-metadata permissions removed in
# v4 — cosign-based attest uses packages:write (sidecar push) + id-token:write
# (OIDC), both already covered.
permissions:
  contents: write
  packages: write
  id-token: write
  security-events: write
  pull-requests: write
  issues: write
  actions: read

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ----- docker-build happy path -----
  # Happy path exercises sign + attest + sbom end-to-end so the catalog
  # itself verifies cosign works on the runner pool. Until 2026-05-20 the
  # ARC runner image lacked gettext-base/envsubst (cosign-installer prereq)
  # and these were forced false. The custom actions-runner-image cutover
  # bakes gettext-base, so flipping these true also serves as the proof
  # that downstream repos (actions-runner-image, etc.) can run sign:true.
  test-docker-build:
    uses: ./.github/workflows/docker-build.yml
    secrets: inherit
    with:
      tag: ''
      prerelease: true
      context: tests/fixtures/minimal-go
      dockerfile: tests/fixtures/minimal-go/Dockerfile
      image_name: ${{ github.repository }}/test-fixture
      sign: true
      attest: true
      sbom: true

  # ----- attestation verification (proves the cosign attest step produced
  # a sigstore-bundled SLSA predicate at the OCI sidecar location) -----
  assert-attestation-verifies:
    needs: test-docker-build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      packages: read
    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: GHCR login (read-only)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTOR: ${{ github.actor }}
        run: |
          echo "$GH_TOKEN" | cosign login ghcr.io -u "$ACTOR" --password-stdin
      - name: Verify cosign SLSA attestation
        env:
          IMG_REF: ${{ needs.test-docker-build.outputs.image_ref }}
        run: |
          set -euo pipefail
          # OIDC identity: cosign attest was invoked from docker-build.yml on this
          # branch, so the cert SAN contains the docker-build.yml workflow path
          # (NOT integration.yml). The regexp matches any ref-suffix.
          cosign verify-attestation \
            --type slsaprovenance \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-identity-regexp '^https://github\.com/serverkraken/reusable-workflows/\.github/workflows/docker-build\.yml@' \
            "$IMG_REF" > /tmp/att.json
          # Defensive: validate the output is well-formed JSON.
          # cosign's exit code is the actual verification signal.
          jq empty /tmp/att.json
          echo "Cosign SLSA attestation verifies for $IMG_REF"

  # ----- trivy-image happy path (no findings against clean fixture) -----
  test-trivy-image-happy:
    needs: test-docker-build
    uses: ./.github/workflows/trivy-image.yml
    secrets: inherit
    with:
      image_ref: ${{ needs.test-docker-build.outputs.image_ref }}
      fail_on_findings: false
      upload_sarif: false

  assert-trivy-image-clean:
    needs: test-trivy-image-happy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Verify findings_count == 0
        env:
          COUNT: ${{ needs.test-trivy-image-happy.outputs.findings_count }}
        run: |
          if [[ "$COUNT" != "0" ]]; then
            echo "::error::Expected 0 findings on clean fixture, got $COUNT"
            exit 1
          fi

  # ----- trivy-fs happy path -----
  test-trivy-fs-happy:
    uses: ./.github/workflows/trivy-fs.yml
    secrets: inherit
    with:
      paths_ignore: |
        tests/fixtures/with-secret
        tests/fixtures/lint-test/helm-lint-fail
      fail_on_findings: false
      upload_sarif: false

  # ----- trivy-fs failure path: must detect secrets on the secret fixture -----
  test-trivy-fs-failure:
    uses: ./.github/workflows/trivy-fs.yml
    secrets: inherit
    with:
      paths_ignore: |
        tests/fixtures/lint-test/helm-lint-fail
      upload_sarif: false
      fail_on_findings: false   # don't fail the job; we assert on findings_count below

  assert-trivy-fs-finds-secrets:
    needs: test-trivy-fs-failure
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Verify findings_count > 0
        env:
          COUNT: ${{ needs.test-trivy-fs-failure.outputs.findings_count }}
        run: |
          if [[ "$COUNT" == "0" ]]; then
            echo "::error::Expected secret findings on with-secret fixture, got 0"
            exit 1
          fi
          echo "trivy-fs correctly detected $COUNT findings"

  # ----- trivy-image failure path: CVE fixture must have findings -----
  test-docker-build-cve:
    uses: ./.github/workflows/docker-build.yml
    secrets: inherit
    with:
      tag: ''
      prerelease: true
      context: tests/fixtures/with-cve
      dockerfile: tests/fixtures/with-cve/Dockerfile
      image_name: ${{ github.repository }}/test-fixture-cve
      sign: false
      attest: false
      sbom: false

  test-trivy-image-cve:
    needs: test-docker-build-cve
    uses: ./.github/workflows/trivy-image.yml
    secrets: inherit
    with:
      image_ref: ${{ needs.test-docker-build-cve.outputs.image_ref }}
      ignore_unfixed: false   # alpine:3.15 HIGH/CRITICAL CVEs all have upstream fixes; without this the test detects 0
      fail_on_findings: false   # don't fail the job; we assert on findings_count below
      upload_sarif: false

  assert-trivy-image-cve-finds-vulns:
    needs: test-trivy-image-cve
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Verify findings_count > 0
        env:
          COUNT: ${{ needs.test-trivy-image-cve.outputs.findings_count }}
        run: |
          if [[ "$COUNT" == "0" ]]; then
            echo "::error::Expected CVEs on alpine:3.15 fixture, got 0"
            exit 1
          fi
          echo "trivy-image correctly detected $COUNT vulns"

  # ----- cleanup-images smoke: verify the workflow accepts inputs -----
  # Runs after all image scans complete so prerelease tags aren't deleted
  # before scanning finishes.
  test-cleanup-images:
    needs:
      - test-trivy-image-happy
      - assert-trivy-image-cve-finds-vulns
    uses: ./.github/workflows/cleanup-images.yml
    with:
      package_name: ${{ github.event.repository.name }}/test-fixture
      keep_stable_versions: 1000
      prerelease_age_days: 365
      runs_on: '["ubuntu-latest"]'

  # ----- docker-build-multi happy path: matrix build of 2 images from
  #       the multi-image fixture, manifest stitched, push by digest. -----
  test-docker-build-multi:
    uses: ./.github/workflows/docker-build-multi.yml
    secrets: inherit
    with:
      tag: ''
      prerelease: true
      context: tests/fixtures/multi-image
      images: >-
        [
          {"dockerfile": "tests/fixtures/multi-image/Dockerfile",
           "image_name": "serverkraken/reusable-workflows/test-multi-api"},
          {"dockerfile": "tests/fixtures/multi-image/Dockerfile.worker",
           "image_name": "serverkraken/reusable-workflows/test-multi-worker"}
        ]
      sign: true
      attest: true
      sbom: true
      caller_id: happy

  # ----- goreleaser happy path: snapshot build against the cli-go fixture
  #       with a valid .goreleaser.yaml. No artifacts published. -----
  test-goreleaser:
    uses: ./.github/workflows/goreleaser.yml
    secrets: inherit
    with:
      working_directory: tests/fixtures/cli-go-with-goreleaser
      snapshot: true

  # ----- helm-publish happy path: dry-run publish of the helm-only fixture
  #       to a test OCI registry path. No actual push (dry_run: true). -----
  test-helm-publish:
    uses: ./.github/workflows/helm-publish.yml
    secrets: inherit
    with:
      chart_path: tests/fixtures/helm-only
      oci_registry: ghcr.io/serverkraken/test
      dry_run: true

  # ----- semantic-release dry-run: exercise the atom against the catalog's
  #       own release-please configs WITHOUT mutating remote state.
  #       skip-github-release + skip-github-pull-request flags on the
  #       release-please-action prevent PR/release/tag mutations. The
  #       atom-level !dry_run guard on the "Move floating major/minor tags"
  #       step prevents the git push --force --tags. So this job exercises
  #       app-token mint, checkout, release-please logic, and output wiring
  #       without any production side-effects.
  test-semantic-release-dry-run:
    uses: ./.github/workflows/semantic-release.yml
    secrets: inherit
    with:
      dry_run: true

  # ----- onboard dry-run: exercise detect + render against the catalog itself -----
  test-onboard-dry-run:
    uses: ./.github/workflows/onboard.yml
    with:
      target_repos: serverkraken/reusable-workflows
      language: auto
      dry_run: true
      pin_version: v1
    secrets: inherit

  # ----- release-flutter-android: happy. Mint a throwaway prerelease on the
  #       catalog repo, build+sign the fixture APK and attach it, then delete
  #       the release. The atom does not create releases (release-please does
  #       in adopters), so the fixture test provides the upload target. -----
  prepare-flutter-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.name }}
    steps:
      - id: tag
        run: echo "name=v0.0.1-fixture-${{ github.run_id }}" >> "$GITHUB_OUTPUT"
      - name: Create throwaway prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.tag.outputs.name }}" \
            --repo "${{ github.repository }}" \
            --title "Fixture release (run ${{ github.run_id }})" \
            --notes "Throwaway release for the release-flutter-android integration test. Auto-deleted." \
            --prerelease \
            --target "${{ github.sha }}"

  test-release-flutter-android:
    needs: prepare-flutter-release
    uses: ./.github/workflows/release-flutter-android.yml
    secrets: inherit
    with:
      working_directory: tests/fixtures/flutter-app
      version: ${{ needs.prepare-flutter-release.outputs.tag }}
      use_build_runner: false
      build_apk: true
      build_aab: false
      prerelease: true
      dart_define_secret_names: "GREETING"
      artefact_name_prefix: catalog-test-flutter-app

  cleanup-flutter-release:
    needs: [prepare-flutter-release, test-release-flutter-android]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Delete fixture release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare-flutter-release.outputs.tag }}
        run: gh release delete "$TAG" --repo "${{ github.repository }}" --yes --cleanup-tag || true

  # ----- Summary: aggregates ALL happy-path children into a single status.
  #       Branch-protection will require ONLY this check. Atom-failure-path
  #       tests (cleanup-images-fail, docker-build-multi-fail, goreleaser-fail,
  #       helm-publish-fail) moved to failure-paths-nightly.yml (Phase 9.5).
  #
  #       The find-something tests (test-trivy-fs-failure, test-docker-build-cve,
  #       test-trivy-image-cve) stay here — they exit 0 with fail_on_findings:false
  #       and the assert-* siblings check the count, not the job result. -----
  summary:
    name: "integration / summary"
    needs:
      - test-docker-build
      - assert-attestation-verifies
      - test-trivy-image-happy
      - assert-trivy-image-clean
      - test-trivy-fs-happy
      - test-trivy-fs-failure
      - assert-trivy-fs-finds-secrets
      - test-docker-build-cve
      - test-trivy-image-cve
      - assert-trivy-image-cve-finds-vulns
      - test-cleanup-images
      - test-semantic-release-dry-run
      - test-onboard-dry-run
      - test-docker-build-multi
      - test-goreleaser
      - test-helm-publish
      - test-release-flutter-android
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Aggregate child statuses
        env:
          NEEDS_JSON: ${{ toJson(needs) }}
        run: |
          set -euo pipefail
          failed=$(echo "$NEEDS_JSON" | jq -r '
            to_entries
            | map(select(.value.result != "success"))
            | .[].key
          ')
          if [[ -n "$failed" ]]; then
            echo "::error::Failing summary children:"
            while IFS= read -r line; do
              echo "  - $line"
            done <<< "$failed"
            exit 1
          fi
          echo "All required children passed (count=$(echo "$NEEDS_JSON" | jq 'keys | length'))."
